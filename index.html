<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Happy Puppy Samarinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { border-bottom: 4px solid #f97316; color: #f97316; }
    </style>
</head>
<body class="bg-gray-50 pb-32 font-sans text-gray-900">

    <div class="h-44 bg-slate-900 relative">
        <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800" class="w-full h-full object-cover opacity-40">
        <div class="absolute bottom-5 left-5 text-white">
            <h1 class="text-2xl font-bold text-orange-400 uppercase leading-tight">Happy Puppy <br>Samarinda</h1>
            <p class="text-[10px] opacity-70 tracking-widest uppercase">Digital Ordering System</p>
        </div>
    </div>

    <div class="sticky top-0 bg-white shadow-sm z-40 overflow-x-auto no-scrollbar flex whitespace-nowrap px-4 border-b border-gray-100" id="tabs-kategori">
        </div>

    <div class="p-5">
        <div id="container-menu" class="space-y-4">
            <p class="text-center py-20 text-gray-400 animate-pulse">Memuat menu pilihan...</p>
        </div>
    </div>

    <div id="btn-keranjang" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-zinc-900 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center hidden z-50">
        <div id="info-pesanan"></div>
        <button onclick="kirimWhatsApp()" class="bg-green-500 active:scale-95 transition-all px-6 py-2 rounded-xl font-bold text-sm">PESAN VIA WA</button>
    </div>

    <script>
        const URL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv"; 
        
        let semuaMenu = [];
        let keranjang = [];
        let kategoriAktif = "SEMUA";

        async function muatMenu() {
            try {
                const response = await fetch(URL_SHEETS);
                const csvText = await response.text();
                const baris = csvText.split(/\r?\n/).slice(1);
                
                semuaMenu = [];
                let daftarKategori = new Set(["SEMUA"]);

                baris.forEach(txt => {
                    let kolom = txt.split(/[;,]/);
                    if (kolom.length >= 2) {
                        const nama = kolom[0]?.trim().replace(/"/g, '') || "";
                        const hargaRaw = kolom[1]?.replace(/[^0-9]/g, '') || "0";
                        const harga = parseInt(hargaRaw);
                        const kategori = kolom[2]?.trim().toUpperCase().replace(/"/g, '') || "LAINNYA";

                        if (nama && harga > 0) {
                            semuaMenu.push({ nama, harga, kategori });
                            daftarKategori.add(kategori);
                        }
                    }
                });

                renderTabs(Array.from(daftarKategori));
                tampilkanMenu();
            } catch (error) {
                document.getElementById('container-menu').innerHTML = "<p class='text-center text-red-500'>Gagal memuat data.</p>";
            }
        }

        function renderTabs(kategoris) {
            let html = "";
            kategoris.forEach(kat => {
                const activeClass = kat === kategoriAktif ? "active-tab font-bold" : "text-gray-400";
                html += `<button onclick="filterKategori('${kat}')" class="px-5 py-4 text-xs uppercase tracking-wider transition-all ${activeClass}">${kat}</button>`;
            });
            document.getElementById('tabs-kategori').innerHTML = html;
        }

        function filterKategori(kat) {
            kategoriAktif = kat;
            muatMenu(); // Refresh tampilan
        }

        function tampilkanMenu() {
            let html = "";
            const menuDifilter = kategoriAktif === "SEMUA" 
                ? semuaMenu 
                : semuaMenu.filter(m => m.kategori === kategoriAktif);

            menuDifilter.forEach(m => {
                html += `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100 animate-fadeIn">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center text-orange-500 font-black italic text-[10px]">HP</div>
                        <div>
                            <h3 class="font-bold text-gray-800 text-sm">${m.nama}</h3>
                            <p class="text-orange-600 text-xs font-black mt-0.5 uppercase tracking-tighter">Rp ${m.harga.toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                    <button onclick="tambahKeKeranjang('${m.nama.replace(/'/g, "\\'")}', ${m.harga})" 
                        class="bg-orange-500 text-white w-10 h-10 rounded-xl font-bold shadow-md flex items-center justify-center text-xl active:scale-90 transition-all">+</button>
                </div>`;
            });
            document.getElementById('container-menu').innerHTML = html || "<p class='text-center py-10 text-gray-400'>Menu belum tersedia di kategori ini.</p>";
        }

        function tambahKeKeranjang(nama, harga) {
            keranjang.push({nama, harga});
            document.getElementById('btn-keranjang').classList.remove('hidden');
            const total = keranjang.reduce((a, b) => a + b.harga, 0);
            document.getElementById('info-pesanan').innerHTML = `
                <p class="font-black text-sm">${keranjang.length} Pesanan</p>
                <p class="text-[10px] text-orange-400 font-bold uppercase">Total: Rp ${total.toLocaleString('id-ID')}</p>
            `;
        }

        function kirimWhatsApp() {
            const noWA = "6285348773757";
            const daftar = keranjang.map(i => `• ${i.nama}`).join('%0A');
            const total = keranjang.reduce((a, b) => a + b.harga, 0);
            const teks = `Halo Happy Puppy Samarinda,%0A%0ASaya mau pesan:%0A${daftar}%0A%0A*Total: Rp ${total.toLocaleString('id-ID')}*`;
            window.open(`https://wa.me/${noWA}?text=${teks}`, '_blank');
        }

        muatMenu();
    </script>
</body>
</html>
