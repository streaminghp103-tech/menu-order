<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Happy Puppy Samarinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow-x: hidden; touch-action: pan-y; font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* FIX: CSS Pop-up yang tadinya hilang */
        #layar-hitam, #layar-bantuan {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 9999; align-items: flex-end;
        }
        #layar-hitam.tampil, #layar-bantuan.tampil { display: flex; }

        .konten-putih {
            background: white; width: 100%; border-radius: 32px 32px 0 0;
            padding: 24px; transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            max-height: 85vh; display: flex; flex-direction: column;
        }
        #layar-hitam.tampil .konten-putih, #layar-bantuan.tampil .konten-putih { transform: translateY(0); }

        .active-tab { 
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white; border-radius: 9999px; 
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.4);
        }

        .badge-promo {
            position: absolute; top: -8px; left: -8px;
            background: #ef4444; color: white;
            font-size: 8px; font-weight: 900; text-transform: uppercase;
            padding: 4px 8px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 10;
        }

        .card-selected { border-color: #fb923c !important; background-color: #fffaf5 !important; }
    </style>
</head>
<body class="bg-slate-50 pb-40 text-slate-900 w-full">

    <div class="h-48 bg-slate-900 relative w-full overflow-hidden">
        <img src="https://images.unsplash.com/photo-1514525253344-76337eb979cd?w=800" class="w-full h-full object-cover opacity-50 scale-110">
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent"></div>
        <div class="absolute top-8 left-6 right-6 flex justify-between items-start">
            <div>
                <p class="text-orange-500 font-black text-[10px] uppercase tracking-widest mb-1 animate-pulse">Now Serving</p>
                <h1 class="text-3xl font-black text-white italic uppercase leading-none text-shadow-lg">Happy Puppy<br><span class="text-orange-500 underline decoration-white/20">Samarinda</span></h1>
            </div>
            <button onclick="bukaBantuan()" class="bg-white/20 backdrop-blur-md border border-white/30 text-white px-4 py-2 rounded-2xl text-[10px] font-black uppercase transition-all shadow-lg active:scale-90">🆘 SOS</button>
        </div>
        <div class="absolute bottom-4 left-6 right-6 bg-orange-500/90 backdrop-blur-sm p-3 rounded-2xl flex justify-between items-center shadow-lg">
            <span class="text-white text-[10px] font-bold uppercase italic">Haus Sing? Cek Minuman Segar! 🍹</span>
            <span class="bg-white text-orange-600 px-2 py-0.5 rounded-lg text-[9px] font-black animate-bounce">PROMO</span>
        </div>
    </div>

    <div class="p-6 bg-white shadow-sm mb-4 rounded-b-[40px]">
        <h2 class="text-[11px] font-black uppercase text-slate-400 mb-4 tracking-widest flex items-center gap-2">
            <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span> Favorit Room Ini
        </h2>
        <div id="container-best-seller" class="flex gap-5 overflow-x-auto no-scrollbar pb-2"></div>
    </div>

    <div class="sticky top-0 bg-white/90 backdrop-blur-md shadow-md z-40 overflow-x-auto no-scrollbar flex whitespace-nowrap px-6 py-4 gap-3" id="tabs-kategori"></div>

    <div class="px-6 py-4 w-full">
        <div id="container-menu" class="space-y-4"></div>
    </div>

    <div id="bar-keranjang" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900 text-white p-5 rounded-3xl shadow-2xl flex justify-between items-center hidden z-50 border border-white/10">
        <div id="ringkasan-singkat"></div>
        <button onclick="munculkanPopup(event)" class="bg-orange-500 px-6 py-3 rounded-2xl font-black text-[11px] uppercase shadow-lg shadow-orange-500/30 active:scale-95 transition-all">Lihat Pesanan</button>
    </div>

    <div id="layar-bantuan" onclick="tutupBantuan()">
        <div class="konten-putih" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8 text-shadow-lg"></div>
            <h2 class="font-black text-2xl text-slate-800 mb-6 uppercase italic text-center">Bantuan</h2>
            <div class="grid grid-cols-1 gap-4 mb-8">
                <button onclick="kirimBantuan('Minta Bill')" class="w-full p-6 bg-slate-50 border rounded-3xl text-left flex justify-between items-center active:bg-orange-50">
                    <div><span class="font-black block italic">MINTA BILL</span><span class="text-xs text-slate-400">Kasir akan antar struk</span></div>
                    <span class="text-3xl">🧾</span>
                </button>
                <button onclick="kirimBantuan('Panggil Staff')" class="w-full p-6 bg-slate-50 border rounded-3xl text-left flex justify-between items-center active:bg-orange-50">
                    <div><span class="font-black block italic">PANGGIL STAFF</span><span class="text-xs text-slate-400">Bantuan pelayanan room</span></div>
                    <span class="text-3xl">🙋‍♂️</span>
                </button>
            </div>
            <button onclick="tutupBantuan()" class="w-full py-2 text-slate-400 font-bold text-[10px] uppercase">Tutup</button>
        </div>
    </div>

    <div id="layar-hitam" onclick="hilangkanPopup()">
        <div class="konten-putih" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
            <div class="flex justify-between items-start mb-6">
                <h2 class="font-black text-2xl text-slate-800 uppercase italic">Pesanan Kamu</h2>
                <button onclick="resetKeranjang()" class="text-red-500 text-[10px] font-bold uppercase px-3 py-1 bg-red-50 rounded-lg">Hapus</button>
            </div>
            <div id="list-checkout" class="space-y-4 overflow-y-auto mb-6 flex-1 pr-2"></div>
            <div class="border-t pt-6">
                <div class="flex justify-between items-center mb-6 px-1">
                    <span class="font-bold text-slate-400 text-xs uppercase">Estimasi Total</span>
                    <span id="harga-akhir" class="font-black text-2xl text-orange-600"></span>
                </div>
                <button onclick="jalankanKirimWA()" class="w-full bg-green-600 text-white py-5 rounded-3xl font-black text-sm shadow-xl shadow-green-600/20 active:scale-95">PESAN VIA WHATSAPP</button>
            </div>
        </div>
    </div>

    <script>
        const URL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv"; 
        const WA_NUMBER = "6285348773757";
        let databaseMenu = [], dataKeranjang = {}, katAktif = "SEMUA", roomNumber = "101"; 

        function deteksiRoom() {
            const params = new URLSearchParams(window.location.search);
            const r = params.get('room');
            if (r) roomNumber = r.toUpperCase();
        }

        async function ambilData() {
            try {
                const res = await fetch(URL_SHEETS + "&t=" + new Date().getTime());
                const text = await res.text();
                const baris = text.split(/\r?\n/).slice(1);
                databaseMenu = []; let setKategori = new Set(["SEMUA"]);
                baris.forEach(r => {
                    let k = r.split(",");
                    if (k.length >= 2) {
                        const nama = k[0]?.replace(/"/g, '').trim();
                        const harga = parseInt(k[1]?.replace(/[^0-9]/g, '')) || 0;
                        const kategori = k[2]?.replace(/"/g, '').trim().toUpperCase() || "LAINNYA";
                        const foto = k[3]?.replace(/"/g, '').trim() || "";
                        if (nama && harga > 0) {
                            databaseMenu.push({ nama, harga, kategori, foto });
                            setKategori.add(kategori);
                        }
                    }
                });
                renderTabs(setKategori); renderBestSeller(); renderMenu();
            } catch (e) { console.error("Error ambil data:", e); }
        }

        function renderTabs(setKategori) {
            let h = "";
            Array.from(setKategori).forEach(kt => {
                const cls = kt === katAktif ? "active-tab" : "bg-slate-100 text-slate-400 font-bold rounded-full";
                h += `<button onclick="gantiKat('${kt}')" class="px-6 py-2.5 text-[10px] uppercase tracking-widest transition-all ${cls}">${kt}</button>`;
            });
            document.getElementById('tabs-kategori').innerHTML = h;
        }

        function renderBestSeller() {
            let h = "";
            databaseMenu.slice(0, 5).forEach((m) => {
                const q = dataKeranjang[m.nama]?.qty || 0;
                const active = q > 0 ? 'bg-orange-500 scale-105' : 'bg-slate-900';
                const img = m.foto ? `<img src="${m.foto}" class="w-full h-28 object-cover rounded-3xl mb-3 shadow-md">` : `<div class="w-full h-28 bg-slate-100 rounded-3xl mb-3 flex items-center justify-center text-3xl">🍲</div>`;
                h += `
                <div class="min-w-[170px] bg-white p-2 rounded-[32px] border border-slate-100 flex flex-col relative">
                    <span class="badge-promo italic font-black">MUST TRY</span>
                    ${img}
                    <div class="px-2 pb-2">
                        <p class="font-black text-slate-800 text-[11px] h-8 overflow-hidden mb-1 leading-tight">${m.nama}</p>
                        <p class="text-orange-600 font-black text-[12px] mb-3">Rp ${m.harga.toLocaleString('id-ID')}</p>
                        <div class="flex items-center rounded-2xl p-1 w-full justify-between ${active} transition-all">
                            <button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', -1)" class="w-8 h-8 text-white font-black text-xl">-</button>
                            <span class="text-white font-black text-sm">${q}</span>
                            <button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="w-8 h-8 text-white font-black text-xl">+</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('container-best-seller').innerHTML = h;
        }

        function renderMenu() {
            let h = "";
            const filtered = katAktif === "SEMUA" ? databaseMenu : databaseMenu.filter(m => m.kategori === katAktif);
            filtered.forEach(m => {
                const q = dataKeranjang[m.nama]?.qty || 0;
                const activeCard = q > 0 ? 'card-selected border-orange-200' : 'bg-white border-slate-100';
                const activeBar = q > 0 ? 'bg-orange-500' : 'bg-slate-800';
                const img = m.foto ? `<img src="${m.foto}" class="w-20 h-20 object-cover rounded-2xl shadow-sm">` : `<div class="w-20 h-20 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl">🍱</div>`;
                h += `
                <div class="p-3 rounded-[32px] flex items-center border transition-all ${activeCard}">
                    <div class="flex-shrink-0 mr-4">${img}</div>
                    <div class="min-w-0 flex-1">
                        <h3 class="font-black text-slate-800 text-[14px] truncate leading-none uppercase italic">${m.nama}</h3>
                        <p class="text-orange-600 font-black text-[13px] mt-2 italic underline decoration-orange-200">Rp ${m.harga.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-center rounded-2xl p-1 min-w-[100px] justify-between transition-all ${activeBar}">
                        <button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', -1)" class="w-9 h-9 flex items-center justify-center text-white font-black text-xl">-</button>
                        <span class="text-white font-black text-sm">${q}</span>
                        <button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="w-9 h-9 flex items-center justify-center text-white font-black text-xl">+</button>
                    </div>
                </div>`;
            });
            document.getElementById('container-menu').innerHTML = h;
        }

        function gantiKat(k) { katAktif = k; renderTabs(new Set(databaseMenu.map(x => x.kategori)).add("SEMUA")); renderMenu(); }

        function ubahQty(nama, d) {
            if (!dataKeranjang[nama]) {
                const item = databaseMenu.find(x => x.nama === nama);
                dataKeranjang[nama] = { ...item, qty: 0 };
            }
            dataKeranjang[nama].qty += d;
            if (dataKeranjang[nama].qty < 0) dataKeranjang[nama].qty = 0;
            renderMenu(); renderBestSeller(); updateBar();
        }

        function updateBar() {
            const arr = Object.values(dataKeranjang).filter(x => x.qty > 0);
            const tQty = arr.reduce((a, b) => a + b.qty, 0);
            const tPrice = arr.reduce((a, b) => a + (b.harga * b.qty), 0);
            const el = document.getElementById('bar-keranjang');
            if (tQty > 0) {
                el.classList.remove('hidden');
                document.getElementById('ringkasan-singkat').innerHTML = `<p class="font-black text-lg">${tQty} Item</p><p class="text-[10px] text-orange-400 font-bold uppercase">Rp ${tPrice.toLocaleString('id-ID')}</p>`;
            } else { el.classList.add('hidden'); }
        }

        function munculkanPopup(e) {
            e.preventDefault();
            const arr = Object.values(dataKeranjang).filter(x => x.qty > 0);
            let h = ""; let t = 0;
            arr.forEach((i) => {
                const s = i.harga * i.qty; t += s;
                h += `<div class="bg-slate-50 p-4 rounded-3xl border flex justify-between items-center"><div><p class="font-black text-slate-800 text-[14px] uppercase italic">${i.nama}</p><p class="text-[10px] text-slate-400 font-bold uppercase">${i.qty} x Rp ${i.harga.toLocaleString('id-ID')}</p></div><span class="font-black text-slate-800 text-sm">Rp ${s.toLocaleString('id-ID')}</span></div>`;
            });
            document.getElementById('list-checkout').innerHTML = h || `<p class="text-center py-10 text-slate-400 font-black text-[10px] uppercase">Kosong</p>`;
            document.getElementById('harga-akhir').innerText = `Rp ${t.toLocaleString('id-ID')}`;
            document.getElementById('layar-hitam').classList.add('tampil');
        }

        function resetKeranjang() { dataKeranjang = {}; hilangkanPopup(); renderMenu(); renderBestSeller(); updateBar(); }
        function hilangkanPopup() { document.getElementById('layar-hitam').classList.remove('tampil'); }
        function bukaBantuan() { document.getElementById('layar-bantuan').classList.add('tampil'); }
        function tutupBantuan() { document.getElementById('layar-bantuan').classList.remove('tampil'); }

        function kirimBantuan(jenis) {
            window.open(`https://wa.me/${WA_NUMBER}?text=Halo Puppy Samarinda, saya tamu ROOM ${roomNumber} butuh: ${jenis}`, '_blank');
            tutupBantuan();
        }

        function jalankanKirimWA() {
            const arr = Object.values(dataKeranjang).filter(x => x.qty > 0);
            if (arr.length === 0) return;
            let msg = `Halo Puppy Samarinda, Pesanan dari ROOM ${roomNumber}:%0A`;
            arr.forEach(i => { msg += `- ${i.nama} (${i.qty}x)%0A`; });
            window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`, '_blank');
        }

        deteksiRoom(); ambilData();
    </script>
</body>
</html>
