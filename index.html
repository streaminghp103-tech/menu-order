<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Happy Puppy Samarinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-32 font-sans">

    <div class="h-44 bg-slate-900 relative">
        <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800" class="w-full h-full object-cover opacity-40">
        <div class="absolute bottom-5 left-5 text-white">
            <h1 class="text-2xl font-bold text-orange-400 uppercase">Happy Puppy <br>Samarinda</h1>
            <p class="text-xs opacity-80 mt-1">Digital Menu & Order System</p>
        </div>
    </div>

    <div class="p-5">
        <h2 class="font-bold text-gray-800 text-lg border-b-4 border-orange-500 inline-block mb-5">Daftar Menu</h2>
        <div id="container-menu" class="space-y-4">
            <p class="text-center py-20 text-gray-400">Menghubungkan data...</p>
        </div>
    </div>

    <div id="btn-keranjang" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-zinc-900 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center hidden z-50">
        <div id="info-pesanan"></div>
        <button onclick="kirimWhatsApp()" class="bg-green-500 px-6 py-2 rounded-xl font-bold text-sm shadow-lg">PESAN VIA WA</button>
    </div>

    <script>
        const URL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv"; 
        
        let keranjang = [];

        async function muatMenu() {
            try {
                const response = await fetch(URL_SHEETS);
                const csvText = await response.text();
                
                // Pisahkan baris
                const baris = csvText.split(/\r?\n/);
                let html = "";

                baris.forEach((txt, index) => {
                    // Coba pisahkan kolom pakai koma atau titik koma
                    let kolom = txt.split(/[;,]/);
                    
                    // Kita cari mana yang teks (nama) dan mana yang angka (harga)
                    let nama = "";
                    let hargaFix = 0;

                    kolom.forEach(k => {
                        let bersih = k.trim().replace(/"/g, '');
                        // Kalau isinya angka (atau ada titik/Rp tapi tetap angka)
                        if (/[0-9]/.test(bersih) && !/[a-zA-Z]{5,}/.test(bersih)) {
                            let angka = bersih.replace(/[^0-9]/g, '');
                            if (angka.length >= 3) hargaFix = parseInt(angka);
                        } else if (bersih.length > 2) {
                            nama = bersih;
                        }
                    });

                    // Hanya tampilkan jika nama dan harga ditemukan
                    if (nama && hargaFix > 0) {
                        html += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100 transition-all active:scale-95">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center text-orange-500 font-black italic">HP</div>
                                <div>
                                    <h3 class="font-bold text-gray-800 text-sm">${nama}</h3>
                                    <p class="text-orange-600 text-xs font-black mt-1 text-lg">Rp ${hargaFix.toLocaleString('id-ID')}</p>
                                </div>
                            </div>
                            <button onclick="tambahKeKeranjang('${nama.replace(/'/g, "\\'")}', ${hargaFix})" 
                                class="bg-orange-500 text-white w-10 h-10 rounded-xl font-bold shadow-md flex items-center justify-center text-xl">+</button>
                        </div>`;
                    }
                });

                document.getElementById('container-menu').innerHTML = html || "<p class='text-center text-red-500'>Data kosong. Pastikan kolom di Sheets sudah benar.</p>";
            } catch (error) {
                document.getElementById('container-menu').innerHTML = "<p class='text-center text-red-500 text-sm'>Gagal memuat. Periksa Link CSV.</p>";
            }
        }

        function tambahKeKeranjang(nama, harga) {
            keranjang.push({nama, harga});
            document.getElementById('btn-keranjang').classList.remove('hidden');
            const total = keranjang.reduce((a, b) => a + b.harga, 0);
            document.getElementById('info-pesanan').innerHTML = `
                <p class="font-black text-sm">${keranjang.length} Item</p>
                <p class="text-[11px] text-orange-400 font-bold">Total: Rp ${total.toLocaleString('id-ID')}</p>
            `;
        }

        function kirimWhatsApp() {
            const noWA = "6285348773757";
            const daftar = keranjang.map(i => `• ${i.nama}`).join('%0A');
            const total = keranjang.reduce((a, b) => a + b.harga, 0);
            const teks = `Halo Happy Puppy Samarinda,%0A%0ASaya pesan:%0A${daftar}%0A%0A*Total: Rp ${total.toLocaleString('id-ID')}*`;
            window.open(`https://wa.me/${noWA}?text=${teks}`, '_blank');
        }

        muatMenu();
    </script>
</body>
</html>
