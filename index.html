<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Happy Puppy Samarinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow-x: hidden; touch-action: pan-y; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { background-color: #f97316; color: white; border-radius: 9999px; }
        .fade-up { animation: fadeUp 0.3s ease-out forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>
<body class="bg-gray-100 pb-36 font-sans text-gray-900 w-full">

    <div class="h-40 bg-slate-900 relative w-full overflow-hidden">
        <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800" class="w-full h-full object-cover opacity-40">
        <div class="absolute bottom-5 left-5 text-white">
            <h1 class="text-xl font-bold text-orange-400 uppercase leading-tight">Happy Puppy <br>Samarinda</h1>
            <p class="text-[9px] opacity-70 tracking-widest uppercase font-medium">Digital Ordering System</p>
        </div>
    </div>

    <div class="sticky top-0 bg-white shadow-sm z-40 overflow-x-auto no-scrollbar flex whitespace-nowrap px-4 py-3 gap-2 border-b border-gray-100" id="tabs-kategori"></div>

    <div class="p-4 w-full max-w-full">
        <div id="container-menu" class="space-y-3">
            <p class="text-center py-20 text-gray-400 text-xs font-medium">Sinkronisasi data...</p>
        </div>
    </div>

    <div id="btn-keranjang" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-zinc-900/95 backdrop-blur-md text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center hidden z-50 fade-up">
        <div id="info-pesanan"></div>
        <button onclick="bukaKonfirmasi()" class="bg-orange-500 active:scale-95 transition-all px-6 py-2 rounded-xl font-bold text-xs shadow-lg">LIHAT PESANAN</button>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl animate-pop overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-5">
                <h2 class="font-black text-lg text-gray-800">Detail Pesanan</h2>
                <button onclick="tutupKonfirmasi()" class="text-gray-400 p-2">✕</button>
            </div>
            
            <div id="ringkasan-item" class="space-y-4 mb-6 border-b pb-6">
                </div>

            <div class="mb-6">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Catatan Tambahan (Opsional)</label>
                <textarea id="catatan-order" placeholder="Contoh: Es batu dipisah, Pedas sedang, dsb..." 
                    class="w-full bg-gray-50 border border-gray-200 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-orange-500 outline-none transition-all" rows="2"></textarea>
            </div>

            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-gray-500">Total Pembayaran</span>
                <span id="total-akhir" class="font-black text-xl text-orange-600"></span>
            </div>

            <button onclick="kirimWhatsApp()" class="w-full bg-green-500 hover:bg-green-600 active:scale-95 transition-all text-white py-4 rounded-2xl font-black text-sm shadow-xl flex items-center justify-center gap-3">
                KIRIM KE WHATSAPP KASIR
            </button>
        </div>
    </div>

    <script>
        const URL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv"; 
        
        let semuaMenu = [];
        let keranjang = {}; 
        let kategoriAktif = "SEMUA";
        let daftarKategoriGlobal = [];

        async function muatMenu() {
            try {
                const response = await fetch(URL_SHEETS + "&t=" + new Date().getTime());
                const csvText = await response.text();
                const baris = csvText.split(/\r?\n/).slice(1);
                semuaMenu = [];
                let setKategori = new Set(["SEMUA"]);

                baris.forEach(txt => {
                    let kolom = txt.split(",");
                    if (kolom.length >= 2) {
                        const nama = kolom[0]?.replace(/"/g, '').trim() || "";
                        const harga = parseInt(kolom[1]?.replace(/[^0-9]/g, '')) || 0;
                        const kategori = kolom[2]?.replace(/"/g, '').trim().toUpperCase() || "LAINNYA";
                        if (nama && harga > 0) {
                            semuaMenu.push({ nama, harga, kategori });
                            setKategori.add(kategori);
                        }
                    }
                });
                daftarKategoriGlobal = Array.from(setKategori);
                renderTabs();
                tampilkanMenu();
            } catch (error) {
                document.getElementById('container-menu').innerHTML = "<p class='text-center py-10'>Gagal sinkron.</p>";
            }
        }

        function renderTabs() {
            let html = "";
            daftarKategoriGlobal.forEach(kat => {
                const activeClass = kat === kategoriAktif ? "active-tab" : "text-gray-500 bg-gray-200/50 rounded-full";
                html += `<button onclick="filterKategori('${kat}')" class="px-5 py-2 text-[10px] font-bold uppercase transition-all ${activeClass}">${kat}</button>`;
            });
            document.getElementById('tabs-kategori').innerHTML = html;
        }

        function filterKategori(kat) {
            kategoriAktif = kat;
            renderTabs();
            tampilkanMenu();
        }

        function tampilkanMenu() {
            let html = "";
            const menuDifilter = kategoriAktif === "SEMUA" ? semuaMenu : semuaMenu.filter(m => m.kategori === kategoriAktif);
            menuDifilter.forEach(m => {
                const qty = keranjang[m.nama]?.qty || 0;
                html += `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100">
                    <div class="min-w-0 flex-1 pr-4">
                        <h3 class="font-bold text-gray-800 text-sm leading-tight truncate">${m.nama}</h3>
                        <p class="text-orange-600 text-[11px] font-black mt-1">Rp ${m.harga.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-center gap-2 bg-gray-50 p-1 rounded-xl border border-gray-200">
                        ${qty > 0 ? `<button onclick="updateQty('${m.nama.replace(/'/g, "\\'")}', -1)" class="w-8 h-8 rounded-lg bg-white shadow-sm text-orange-500 font-bold flex items-center justify-center">-</button>
                        <span class="font-bold text-xs w-4 text-center text-gray-800">${qty}</span>` : ''}
                        <button onclick="updateQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="bg-orange-500 text-white w-8 h-8 rounded-lg font-bold flex items-center justify-center shadow-md shadow-orange-200">+</button>
                    </div>
                </div>`;
            });
            document.getElementById('container-menu').innerHTML = html;
        }

        function updateQty(nama, delta) {
            if (!keranjang[nama]) {
                const itemData = semuaMenu.find(m => m.nama === nama);
                keranjang[nama] = { ...itemData, qty: 0 };
            }
            keranjang[nama].qty += delta;
            if (keranjang[nama].qty <= 0) delete keranjang[nama];
            tampilkanMenu();
            updateKeranjangUI();
        }

        function updateKeranjangUI() {
            const items = Object.values(keranjang);
            const totalQty = items.reduce((acc, curr) => acc + curr.qty, 0);
            const totalPrice = items.reduce((acc, curr) => acc + (curr.harga * curr.qty), 0);
            const btn = document.getElementById('btn-keranjang');
            if (totalQty > 0) {
                btn.classList.remove('hidden');
                document.getElementById('info-pesanan').innerHTML = `
                    <p class="font-black text-sm">${totalQty} Item</p>
                    <p class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">Rp ${totalPrice.toLocaleString('id-ID')}</p>`;
            } else { btn.classList.add('hidden'); }
        }

        function bukaKonfirmasi() {
            const items = Object.values(keranjang);
            let html = "";
            let total = 0;
            items.forEach(i => {
                const subtotal = i.harga * i.qty;
                total += subtotal;
                html += `
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <p class="font-bold text-gray-800 text-sm leading-tight">${i.nama}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">${i.qty} x Rp ${i.harga.toLocaleString('id-ID')}</p>
                    </div>
                    <span class="font-black text-gray-800 text-sm">Rp ${subtotal.toLocaleString('id-ID')}</span>
                </div>`;
            });
            document.getElementById('ringkasan-item').innerHTML = html;
            document.getElementById('total-akhir').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('modal-checkout').classList.remove('hidden');
            document.getElementById('modal-checkout').classList.add('flex');
        }

        function tutupKonfirmasi() {
            document.getElementById('modal-checkout').classList.add('hidden');
            document.getElementById('modal-checkout').classList.remove('flex');
        }

        function kirimWhatsApp() {
            const noWA = "6285348773757";
            const items = Object.values(keranjang);
            const catatan = document.getElementById('catatan-order').value;
            const daftar = items.map(i => `• ${i.nama} (${i.qty}x)`).join('%0A');
            const total = items.reduce((acc, curr) => acc + (curr.harga * curr.qty), 0);
            const teks = `Halo Happy Puppy Samarinda,%0A%0ASaya pesan:%0A${daftar}%0A%0A*Catatan:* ${catatan || '-'}%0A%0A*Total: Rp ${total.toLocaleString('id-ID')}*`;
            window.open(`https://wa.me/${noWA}?text=${teks}`, '_blank');
        }

        muatMenu();
    </script>
</body>
</html>
