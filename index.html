<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Happy Puppy Samarinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow-x: hidden; touch-action: pan-y; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { 
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white; border-radius: 9999px; border: transparent !important;
        }
        
        #layar-hitam, #layar-bantuan {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 9999; align-items: flex-end;
        }
        #layar-hitam.tampil, #layar-bantuan.tampil { display: flex; }
        
        .konten-putih {
            background: white; width: 100%; border-radius: 32px 32px 0 0;
            padding: 24px; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            max-height: 90vh; display: flex; flex-direction: column;
        }
        #layar-hitam.tampil .konten-putih, #layar-bantuan.tampil .konten-putih { transform: translateY(0); }
        
        .tab-popup { border-bottom: 2px solid #f1f5f9; }
        .tab-popup-btn { padding: 12px; font-size: 11px; font-weight: 900; text-transform: uppercase; color: #94a3b8; position: relative; }
        .tab-popup-btn.active { color: #f97316; }
        .tab-popup-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; h: 2px; background: #f97316; }

        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
        .animate-order { animation: pulse-orange 2s infinite; }
    </style>
</head>
<body class="bg-slate-50 pb-40 font-sans text-slate-900 w-full">

    <div class="bg-slate-900 relative w-full overflow-hidden p-6 pt-8 rounded-b-[40px] shadow-lg">
        <img src="https://images.unsplash.com/photo-1514525253344-76337eb979cd?w=800" class="absolute inset-0 w-full h-full object-cover opacity-30">
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent"></div>
        <div class="relative z-10 flex justify-between items-start mb-6">
            <div class="text-white">
                <h1 class="text-2xl font-black uppercase italic leading-tight">Happy Puppy<br><span class="text-orange-500">Samarinda</span></h1>
                <div id="info-room-header" class="mt-2 inline-block bg-white/10 border border-white/20 px-3 py-1 rounded-full text-[9px] font-bold uppercase backdrop-blur-md text-orange-200 tracking-widest">📍 Room: --</div>
            </div>
            <button onclick="bukaBantuan()" class="bg-white/10 border border-white/20 text-white p-3 rounded-2xl backdrop-blur-md active:scale-90 text-xl">🆘</button>
        </div>
        <div class="relative z-10">
            <div class="bg-white/10 border border-white/20 backdrop-blur-md rounded-2xl flex items-center px-4 py-1">
                <span class="mr-2">🔍</span>
                <input type="text" id="input-cari" oninput="filterMenu()" placeholder="Cari menu favorit..." class="w-full py-3 bg-transparent text-sm outline-none font-medium text-white placeholder:text-white/50 italic">
            </div>
        </div>
    </div>

    <div id="section-best-seller" class="p-5 bg-white mb-3 shadow-sm rounded-b-[32px]">
        <h2 class="text-[11px] font-black uppercase text-slate-400 mb-4 tracking-widest">🔥 Menu Populer</h2>
        <div id="container-best-seller" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
    </div>

    <div class="sticky top-0 bg-slate-50/80 backdrop-blur-lg z-40 overflow-x-auto no-scrollbar flex whitespace-nowrap px-5 py-4 gap-3" id="tabs-kategori"></div>

    <div class="p-5 w-full">
        <div id="container-menu" class="space-y-4"></div>
    </div>

    <div id="bar-keranjang" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900 text-white p-5 rounded-[24px] shadow-2xl flex justify-between items-center hidden z-50 border border-white/10">
        <div id="ringkasan-singkat"></div>
        <button type="button" onclick="munculkanPopup('keranjang')" class="bg-orange-500 px-6 py-3 rounded-xl font-black text-[11px] uppercase shadow-lg animate-order active:scale-95 transition-all">
            Lihat Pesanan
        </button>
    </div>

    <div id="layar-hitam" onclick="hilangkanPopup()">
        <div class="konten-putih" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
            
            <div class="flex tab-popup mb-6">
                <button onclick="setTabPopup('keranjang')" id="btn-tab-keranjang" class="flex-1 tab-popup-btn active">Menu Baru</button>
                <button onclick="setTabPopup('riwayat')" id="btn-tab-riwayat" class="flex-1 tab-popup-btn">Pesanan Saya ✅</button>
            </div>

            <div id="konten-keranjang" class="flex-1 flex flex-col overflow-hidden">
                <div id="list-checkout" class="space-y-4 overflow-y-auto mb-2 pr-1 flex-1 no-scrollbar"></div>
                <div class="border-t border-slate-100 pt-4">
                    <div class="flex justify-between items-center mb-4 px-1">
                        <span class="font-black text-slate-400 text-[10px] uppercase tracking-widest">Total Baru</span>
                        <span id="harga-akhir" class="font-black text-2xl text-orange-600 italic">Rp 0</span>
                    </div>
                    <button type="button" onclick="jalankanKirimWA()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-sm uppercase flex items-center justify-center gap-3 shadow-xl">
                        KIRIM KE WHATSAPP 🚀
                    </button>
                </div>
            </div>

            <div id="konten-riwayat" class="flex-1 flex flex-col overflow-hidden hidden">
                <div id="list-riwayat" class="space-y-3 overflow-y-auto mb-4 pr-1 flex-1 no-scrollbar text-center"></div>
                <p class="text-[10px] text-slate-400 text-center italic mb-4">*Data ini adalah riwayat pesanan Anda di sesi ini.</p>
                <button onclick="hilangkanPopup()" class="w-full py-4 bg-slate-100 rounded-2xl font-black text-[11px] uppercase text-slate-500">Kembali Pesan Lagi</button>
            </div>
        </div>
    </div>

    <div id="layar-bantuan" onclick="tutupBantuan()">
        <div class="konten-putih" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h2 class="font-black text-xl text-center italic mb-6 uppercase">Layanan Room</h2>
            <button onclick="kirimBantuan('Minta Bill')" class="w-full p-5 bg-slate-50 border mb-3 rounded-2xl text-left flex justify-between items-center">
                <span class="font-black text-slate-700 italic uppercase">Minta Bill</span><span>🧾</span>
            </button>
            <button onclick="kirimBantuan('Panggil Pelayan')" class="w-full p-5 bg-slate-50 border mb-6 rounded-2xl text-left flex justify-between items-center">
                <span class="font-black text-slate-700 italic uppercase">Panggil Staff</span><span>🙋‍♂️</span>
            </button>
        </div>
    </div>

    <script>
        const URL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv"; 
        const WA_NUMBER = "6285348773757";
        
        let databaseMenu = [];
        let listKategoriTetap = [];
        let dataKeranjang = {}; 
        let riwayatPesanan = []; // Menyimpan apa yang sudah dikirim ke WA
        let katAktif = "SEMUA";
        let roomNumber = "101"; 
        let currentTabPopup = 'keranjang';

        function deteksiRoom() {
            const params = new URLSearchParams(window.location.search);
            const r = params.get('room');
            if (r) roomNumber = r.toUpperCase();
            document.getElementById('info-room-header').innerText = "📍 Room: " + roomNumber;
        }

        async function ambilData() {
            try {
                const res = await fetch(URL_SHEETS + "&t=" + new Date().getTime());
                const text = await res.text();
                const baris = text.split(/\r?\n/).slice(1);
                databaseMenu = []; let setKategori = new Set();
                baris.forEach(r => {
                    let k = r.split(",");
                    if (k.length >= 2) {
                        const nama = k[0]?.replace(/"/g, '').trim();
                        const harga = parseInt(k[1]?.replace(/[^0-9]/g, '')) || 0;
                        const kategori = k[2]?.replace(/"/g, '').trim().toUpperCase() || "LAINNYA";
                        databaseMenu.push({ nama, harga, kategori, foto: k[3]||"", deskripsi: k[4]||"" });
                        setKategori.add(kategori);
                    }
                });
                listKategoriTetap = ["SEMUA", ...Array.from(setKategori).sort()];
                renderTabs(); renderBestSeller(); renderMenu();
            } catch (e) { console.error(e); }
        }

        function renderMenu() {
            let html = "";
            const filtered = databaseMenu.filter(m => (katAktif === "SEMUA" || m.kategori === katAktif) && m.nama.toLowerCase().includes(document.getElementById('input-cari').value.toLowerCase()));
            filtered.forEach(m => {
                const q = dataKeranjang[m.nama]?.qty || 0;
                html += `
                <div class="p-3 bg-white rounded-[28px] shadow-sm flex items-start border-2 ${q > 0 ? 'border-orange-500 bg-orange-50/20' : 'border-white'}">
                    <div class="w-24 h-24 bg-slate-100 rounded-2xl flex-shrink-0 mr-4 overflow-hidden">
                        ${m.foto ? `<img src="${m.foto}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center text-2xl">🍱</div>'}
                    </div>
                    <div class="flex-1 pt-1 min-w-0">
                        <h3 class="font-black text-slate-800 text-[14px] truncate uppercase italic">${m.nama}</h3>
                        <p class="text-orange-600 text-[13px] font-black mt-4 italic">Rp ${m.harga.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex flex-col items-center gap-2 bg-slate-50 p-1 rounded-2xl">
                        <button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="bg-orange-500 text-white w-10 h-10 rounded-xl font-black text-xl">+</button>
                        ${q > 0 ? `<span class="font-black text-sm">${q}</span><button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', -1)" class="text-red-400 font-bold text-[9px] uppercase">Hapus</button>` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('container-menu').innerHTML = html;
        }

        function ubahQty(nama, d) {
            if (!dataKeranjang[nama]) {
                const item = databaseMenu.find(x => x.nama === nama);
                dataKeranjang[nama] = { ...item, qty: 0, catatan: "" };
            }
            dataKeranjang[nama].qty += d;
            if (dataKeranjang[nama].qty <= 0) delete dataKeranjang[nama];
            renderMenu(); updateBar();
        }

        function updateBar() {
            const arr = Object.values(dataKeranjang);
            const tQty = arr.reduce((a, b) => a + b.qty, 0);
            const tPrice = arr.reduce((a, b) => a + (b.harga * b.qty), 0);
            const el = document.getElementById('bar-keranjang');
            if (tQty > 0) {
                el.classList.remove('hidden');
                document.getElementById('ringkasan-singkat').innerHTML = `<p class="font-black text-lg italic leading-none">${tQty} Item</p><p class="text-[9px] text-orange-400 font-black uppercase mt-1">Rp ${tPrice.toLocaleString('id-ID')}</p>`;
            } else { el.classList.add('hidden'); }
        }

        function setTabPopup(type) {
            currentTabPopup = type;
            const btnKeranjang = document.getElementById('btn-tab-keranjang');
            const btnRiwayat = document.getElementById('btn-tab-riwayat');
            const kontKeranjang = document.getElementById('konten-keranjang');
            const kontRiwayat = document.getElementById('konten-riwayat');

            if(type === 'keranjang') {
                btnKeranjang.classList.add('active'); btnRiwayat.classList.remove('active');
                kontKeranjang.classList.remove('hidden'); kontRiwayat.classList.add('hidden');
                munculkanPopup('keranjang');
            } else {
                btnRiwayat.classList.add('active'); btnKeranjang.classList.remove('active');
                kontRiwayat.classList.remove('hidden'); kontKeranjang.classList.add('hidden');
                renderRiwayat();
            }
        }

        function munculkanPopup(initialTab) {
            if(initialTab) currentTabPopup = initialTab;
            const arr = Object.values(dataKeranjang);
            let h = ""; let t = 0;
            arr.forEach((i) => {
                const s = i.harga * i.qty; t += s;
                h += `
                <div class="bg-slate-50 p-4 rounded-[24px] border border-slate-100 flex flex-col gap-3">
                    <div class="flex justify-between items-start">
                        <p class="font-black text-slate-800 text-[14px] uppercase italic flex-1 pr-4">${i.nama}</p>
                        <div class="flex flex-col items-end gap-1">
                            <span class="font-black text-slate-800 text-[13px]">Rp ${s.toLocaleString('id-ID')}</span>
                            <div class="flex items-center gap-3 bg-white border rounded-lg px-2 py-1">
                                <button onclick="ubahQty('${i.nama.replace(/'/g, "\\'")}', -1); munculkanPopup()" class="text-red-500 font-bold">-</button>
                                <span class="text-[11px] font-black">${i.qty}</span>
                                <button onclick="ubahQty('${i.nama.replace(/'/g, "\\'")}', 1); munculkanPopup()" class="text-green-500 font-bold">+</button>
                            </div>
                        </div>
                    </div>
                    <input type="text" onchange="dataKeranjang['${i.nama.replace(/'/g, "\\'")}'].catatan=this.value" value="${i.catatan || ''}" placeholder="Tambah catatan..." class="w-full bg-white border rounded-xl py-3 px-4 text-[11px] outline-none italic">
                </div>`;
            });
            document.getElementById('list-checkout').innerHTML = h || `<p class="text-center py-10 text-slate-300 font-black uppercase text-[10px]">Keranjang Kosong</p>`;
            document.getElementById('harga-akhir').innerText = `Rp ${t.toLocaleString('id-ID')}`;
            document.getElementById('layar-hitam').classList.add('tampil');
        }

        function renderRiwayat() {
            let h = "";
            if(riwayatPesanan.length === 0) {
                h = `<div class="py-12"><span class="text-4xl block mb-4">😶</span><p class="text-slate-400 font-black text-[10px] uppercase">Belum ada pesanan yang terkirim.</p></div>`;
            } else {
                riwayatPesanan.forEach((order, index) => {
                    h += `<div class="bg-green-50 border border-green-100 p-4 rounded-2xl text-left mb-4">
                        <div class="flex justify-between mb-2"><span class="text-[9px] font-black text-green-600 uppercase italic">Order #${index+1}</span><span class="text-[9px] text-slate-400">${order.jam}</span></div>
                        ${order.items.map(i => `<div class="flex justify-between text-[11px] font-bold text-slate-700"><span>${i.qty}x ${i.nama}</span><span>Rp ${(i.qty*i.harga).toLocaleString('id-ID')}</span></div>`).join('')}
                    </div>`;
                });
            }
            document.getElementById('list-riwayat').innerHTML = h;
        }

        function jalankanKirimWA() {
            const arr = Object.values(dataKeranjang);
            if (arr.length === 0) return;
            const t = arr.reduce((a, b) => a + (b.harga * b.qty), 0);
            const sekarang = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
            
            // Simpan ke riwayat lokal sebelum hapus keranjang
            riwayatPesanan.push({ jam: sekarang, items: JSON.parse(JSON.stringify(arr)), total: t });

            let msg = `Halo Happy Puppy Samarinda,%0A%0ASaya dari *ROOM ${roomNumber}* ingin memesan:%0A%0A`;
            arr.forEach(i => { msg += `- *${i.nama}* (${i.qty}x)%0A${i.catatan ? `  _(Catatan: ${i.catatan})_%0A` : ''}`; });
            msg += `%0A*TOTAL: Rp ${t.toLocaleString('id-ID')}*%0A%0AMohon diproses!`;
            
            window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`, '_blank');
            
            // Bersihkan keranjang dan pindah ke tab riwayat
            dataKeranjang = {}; 
            renderMenu(); updateBar();
            setTabPopup('riwayat');
        }

        function gantiKat(k) { katAktif = k; renderMenu(); renderTabs(); }
        function renderTabs() {
            let htmlKat = "";
            listKategoriTetap.forEach(kt => {
                const cls = kt === katAktif ? "active-tab" : "bg-white text-slate-400 border";
                htmlKat += `<button onclick="gantiKat('${kt}')" class="px-6 py-3 text-[10px] font-black uppercase tracking-widest ${cls}">${kt}</button>`;
            });
            document.getElementById('tabs-kategori').innerHTML = htmlKat;
        }
        function renderBestSeller() {
            let html = "";
            databaseMenu.slice(0, 5).forEach(m => {
                html += `<div onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="min-w-[140px] bg-slate-50 p-2 rounded-[24px] border relative">
                    <div class="h-24 bg-white rounded-2xl mb-2 overflow-hidden">${m.foto ? `<img src="${m.foto}" class="w-full h-full object-cover">` : ''}</div>
                    <p class="font-black text-slate-800 text-[10px] truncate uppercase px-1 italic">${m.nama}</p>
                </div>`;
            });
            document.getElementById('container-best-seller').innerHTML = html;
        }

        function filterMenu() { renderMenu(); }
        function hilangkanPopup() { document.getElementById('layar-hitam').classList.remove('tampil'); }
        function bukaBantuan() { document.getElementById('layar-bantuan').classList.add('tampil'); }
        function tutupBantuan() { document.getElementById('layar-bantuan').classList.remove('tampil'); }
        function resetKeranjang() { dataKeranjang = {}; hilangkanPopup(); renderMenu(); updateBar(); }

        deteksiRoom(); ambilData();
    </script>
</body>
</html>
