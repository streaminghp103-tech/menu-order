<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Happy Puppy Samarinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; 
            touch-action: pan-y; 
            scroll-behavior: smooth; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .active-tab { 
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white; 
            border-radius: 9999px;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
            border: transparent !important;
        }
        
        #layar-hitam, #layar-bantuan, #notif-sukses {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 9999; align-items: flex-end;
        }
        #layar-hitam.tampil, #layar-bantuan.tampil, #notif-sukses.tampil { display: flex; }
        
        .konten-putih {
            position: relative;
            background: white; width: 100%; border-radius: 32px 32px 0 0;
            padding: 24px; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            max-height: 90vh; display: flex; flex-direction: column;
        }
        #layar-hitam.tampil .konten-putih, #layar-bantuan.tampil .konten-putih, #notif-sukses.tampil .konten-putih { transform: translateY(0); }
        
        #wifi-activation-bar { 
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow: hidden; 
        }

        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
        .animate-order { animation: pulse-orange 2s infinite; }

        .badge-hot {
            position: absolute; top: 6px; left: 6px;
            background: #ef4444; color: white; font-size: 8px;
            font-weight: 900; padding: 2px 8px; border-radius: 6px;
            z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-slate-50 pb-40 text-slate-900 w-full">

    <div id="wifi-activation-bar" class="hidden bg-slate-900 p-4 border-b border-white/10">
        <div class="flex justify-between items-center mb-2">
            <span id="wifi-status-text" class="text-[10px] font-black text-orange-500 uppercase tracking-widest italic">Inisialisasi...</span>
            <span id="wifi-percentage" class="text-[10px] font-black text-white italic">0%</span>
        </div>
        <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden">
            <div id="wifi-progress-line" class="h-full bg-orange-500 w-0 transition-all duration-75"></div>
        </div>
    </div>

    <div id="top-header" class="bg-slate-900 relative p-6 pt-8 rounded-b-[40px] shadow-lg overflow-hidden border-b-4 border-orange-500">
        <img src="https://images.unsplash.com/photo-1514525253344-76337eb979cd?w=800" class="absolute inset-0 w-full h-full object-cover opacity-30">
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent"></div>
        
        <div class="relative z-10 flex justify-between items-start mb-6">
            <div class="text-white">
                <h1 class="text-2xl font-black uppercase italic leading-tight tracking-tighter">Happy Puppy<br><span class="text-orange-500">Samarinda</span></h1>
                <div id="info-room-header" class="mt-2 inline-block bg-white/10 border border-white/20 px-3 py-1 rounded-full text-[9px] font-bold uppercase backdrop-blur-md text-orange-200 tracking-widest">📍 WiFi Connected</div>
            </div>
            <button onclick="bukaBantuan()" class="bg-white/10 border border-white/20 text-white p-3 rounded-2xl backdrop-blur-md active:scale-90 text-sm font-black uppercase italic">Bantuan</button>
        </div>

        <div class="relative z-10">
            <div class="bg-white/10 border border-white/20 backdrop-blur-md rounded-2xl flex items-center px-4 py-1 focus-within:bg-white transition-all">
                <span class="mr-2">🔍</span>
                <input type="text" id="input-cari" oninput="cekInputCari()" placeholder="Mau makan apa hari ini?" class="w-full py-3 bg-transparent text-sm outline-none font-medium text-white focus:text-slate-800 italic">
                <button id="btn-reset-cari" onclick="resetCari()" class="hidden text-slate-400 p-2 text-lg">✕</button>
            </div>

            <div id="widget-pesanan-saya" class="mt-4 hidden animate-fadeIn">
                <div class="bg-orange-500/20 border border-orange-500/30 backdrop-blur-md rounded-2xl p-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black text-orange-400 uppercase tracking-widest flex items-center gap-2">
                            <span class="flex h-2 w-2 rounded-full bg-orange-500 animate-pulse"></span> Sedang Diproses
                        </span>
                        <span id="jumlah-riwayat" class="bg-orange-500 text-white text-[9px] font-black px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <div id="list-riwayat-luar" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="section-best-seller" class="p-5 bg-white mb-3 shadow-sm rounded-b-[32px]">
        <h2 class="text-[11px] font-black uppercase text-slate-400 mb-4 tracking-[0.2em] flex items-center gap-2">
            <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span> Menu Terlaris Pekan Ini
        </h2>
        <div id="container-best-seller" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
    </div>

    <div class="sticky top-0 bg-slate-50/80 backdrop-blur-lg z-40 overflow-x-auto no-scrollbar flex whitespace-nowrap px-5 py-4 gap-3" id="tabs-kategori"></div>

    <div class="p-5 w-full">
        <div id="container-menu" class="space-y-4"></div>
    </div>

    <div id="bar-keranjang" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-slate-900 text-white p-5 rounded-[28px] shadow-2xl flex justify-between items-center hidden z-50 border border-white/10 backdrop-blur-xl">
        <div id="ringkasan-singkat">
            </div>
        <button id="btn-keranjang" onclick="munculkanPopup(event)" class="bg-orange-500 px-6 py-4 rounded-2xl font-black text-[11px] uppercase animate-order tracking-wider">
            Lihat Pesanan
        </button>
    </div>

    <div id="layar-hitam" onclick="hilangkanPopup()">
        <div class="konten-putih" onclick="event.stopPropagation()">
            <div class="w-10 h-1 bg-slate-100 rounded-full mx-auto mb-5"></div>
            
            <div class="flex justify-between items-center mb-5 px-1">
                <div class="flex flex-col">
                    <h2 class="font-black text-xl text-slate-800 uppercase italic tracking-tighter leading-none">Keranjang</h2>
                    <span class="text-[9px] font-bold text-slate-400 uppercase italic mt-1 tracking-wider">Happy Puppy Samarinda</span>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="resetKeranjang()" class="text-red-500 text-[9px] font-black uppercase bg-red-50 px-3 py-2 rounded-xl italic">Reset</button>
                    <button onclick="hilangkanPopup()" class="w-9 h-9 flex items-center justify-center bg-slate-100 text-slate-500 rounded-full font-bold text-sm">✕</button>
                </div>
            </div>
            
            <div id="list-checkout" class="overflow-y-auto mb-2 flex-1 no-scrollbar pr-1">
                </div>
            
            <div class="mt-2 pt-4 border-t border-slate-50">
                <div class="flex items-center gap-4 mb-4">
                    <div class="flex-[1.5] relative">
                        <select id="input-room-final" onchange="cekRoomStatus()" class="w-full bg-slate-50 border-none p-4 rounded-2xl font-black text-slate-800 outline-none text-[11px] tracking-wider shadow-inner appearance-none focus:ring-2 focus:ring-orange-500/20">
                            <option value="" disabled selected>PILIH ROOM...</option>
                            <optgroup label="LANTAI 1">
                                <option value="101">101</option><option value="102">102</option><option value="103">103</option>
                                <option value="104">104</option><option value="105">105</option>
                            </optgroup>
                            <optgroup label="LANTAI 2">
                                <option value="201">201</option><option value="202">202</option><option value="203">203</option><option value="205">205</option>
                            </optgroup>
                            <optgroup label="SPECIAL">
                                <option value="VIP 1">VIP 1</option><option value="VIP 2">VIP 2</option><option value="SUITE">SUITE</option>
                            </optgroup>
                            <option value="LOBBY">LOBBY / WAITING</option>
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-[8px] text-slate-300">▼</div>
                    </div>

                    <div class="flex-1 text-right">
                        <p class="text-[8px] font-black text-slate-400 uppercase italic leading-none mb-1">Total Bayar</p>
                        <p id="harga-akhir" class="text-xl font-black text-orange-600 italic leading-none">Rp 0</p>
                    </div>
                </div>

                <button type="button" id="btn-kirim-wa" onclick="jalankanKirimWA()" disabled class="w-full bg-slate-200 text-slate-400 py-5 rounded-[24px] font-black text-[12px] uppercase tracking-[0.15em] transition-all duration-300 shadow-sm active:scale-95">
                    Pilih Room Dulu 🎤
                </button>
                <span id="subtotal-angka" class="hidden">Rp 0</span>
            </div>
        </div>
    </div>

    <div id="notif-sukses" onclick="tutupNotifSelesai()">
        <div class="konten-putih items-center text-center pb-12" onclick="event.stopPropagation()">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mb-6 shadow-inner">✓</div>
            <h2 class="text-2xl font-black text-slate-800 uppercase italic mb-2 tracking-tighter">Pesanan Terkirim!</h2>
            <p class="text-slate-500 text-sm px-6 leading-relaxed mb-8 font-medium italic">Pesanan Kakak sedang disiapkan untuk <span class="font-black text-orange-500 uppercase italic">Room <span class="no-room">--</span></span>. Mohon ditunggu ya!</p>
            <button onclick="tutupNotifSelesai()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-sm uppercase italic tracking-widest">Siap, Terima Kasih!</button>
        </div>
    </div>

    <div id="layar-bantuan" onclick="tutupBantuan()">
        <div class="konten-putih" onclick="event.stopPropagation()">
            <button onclick="tutupBantuan()" class="absolute top-5 right-6 text-slate-300 text-2xl font-bold p-2">✕</button>
            <h2 class="font-black text-xl text-slate-800 mb-6 uppercase italic text-center">Layanan Room</h2>
            <div class="space-y-4 mb-8">
                <button onclick="kirimBantuan('Minta Bill')" class="w-full p-5 bg-slate-50 border border-slate-100 rounded-2xl text-left flex justify-between items-center font-black text-slate-700 italic uppercase">Minta Bill 🧾</button>
                <button onclick="kirimBantuan('Panggil Pelayan')" class="w-full p-5 bg-slate-50 border border-slate-100 rounded-2xl text-left flex justify-between items-center font-black text-slate-700 italic uppercase">Panggil Staff 🙋‍♂️</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
const URL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHi (link tetap sama)"; 
const WA_NUMBER = "6285348773757";

let databaseMenu = [];
let listKategoriTetap = [];
let dataKeranjang = {}; 
let riwayatPesananLokal = [];
let katAktif = "SEMUA";
let roomNumber = "--"; 
let queryCari = "";

// 1. LOGIKA LOADING
function inisialisasiWiFi() {
    const params = new URLSearchParams(window.location.search);
    const adaNomorRoom = params.get('room');
    if (!adaNomorRoom) {
        const bar = document.getElementById('wifi-activation-bar');
        if(!bar) return;
        bar.classList.remove('hidden');
        let p = 0;
        const iv = setInterval(() => {
            p++;
            document.getElementById('wifi-progress-line').style.width = p + "%";
            document.getElementById('wifi-percentage').innerText = p + "%";
            if (p >= 100) { 
                clearInterval(iv); 
                setTimeout(() => { bar.style.opacity = "0"; setTimeout(() => bar.classList.add('hidden'), 500); }, 2000); 
            }
        }, 30); 
    }
}

// 2. PROTEKSI SESI
function proteksiSesi() {
    const DURASI = 2 * 60 * 60 * 1000;
    const now = new Date().getTime();
    const tag = 'sesi_hp_samarinda';
    const start = localStorage.getItem(tag);
    if (!start) { localStorage.setItem(tag, now); return true; }
    if (now - parseInt(start) > DURASI) {
        document.body.innerHTML = `<div class="h-screen bg-slate-900 text-white flex flex-col items-center justify-center p-10 text-center"><h1 class="text-2xl font-black italic mb-4">SESI HABIS</h1><p class="text-slate-400 text-xs">Silakan scan ulang QR Code di room.</p></div>`;
        return false;
    }
    return true;
}

// 3. LOGIKA DATA & ROOM
async function ambilData() {
    try {
        const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv&t=" + new Date().getTime());
        const text = await res.text();
        const baris = text.split(/\r?\n/).slice(1);
        databaseMenu = [];
        let setKategori = new Set();
        baris.forEach(r => {
            let k = r.split(",");
            if (k.length >= 2) {
                const nama = k[0]?.replace(/"/g, '').trim();
                const harga = parseInt(k[1]?.replace(/[^0-9]/g, '')) || 0;
                const kategori = k[2]?.replace(/"/g, '').trim().toUpperCase() || "LAINNYA";
                const foto = k[3]?.replace(/"/g, '').trim() || "";
                const deskripsi = k[4]?.replace(/"/g, '').trim() || ""; 
                if (nama && harga > 0) {
                    databaseMenu.push({ nama, harga, kategori, foto, deskripsi });
                    setKategori.add(kategori);
                }
            }
        });
        listKategoriTetap = ["SEMUA", ...Array.from(setKategori).sort()];
        renderTabs(); renderBestSeller(); renderMenu();
    } catch (e) { console.error("Gagal ambil data:", e); }
}

function deteksiRoom() {
    const params = new URLSearchParams(window.location.search);
    const r = params.get('room');
    if (r) {
        roomNumber = r.toUpperCase();
        const drop = document.getElementById('input-room-final');
        if(drop) { drop.value = roomNumber; }
    }
    updateTampilanRoom();
}

function updateTampilanRoom() {
    document.querySelectorAll('.no-room').forEach(el => el.innerText = roomNumber);
    const headerRoom = document.getElementById('info-room-header');
    if(headerRoom && roomNumber !== "--") headerRoom.innerText = "📍 Room: " + roomNumber;
}

function cekRoomStatus() {
    const val = document.getElementById('input-room-final').value;
    const btn = document.getElementById('btn-kirim-wa');
    const hargaAkhir = document.getElementById('harga-akhir')?.innerText || "0";
    
    const stAngka = document.getElementById('subtotal-angka');
    if(stAngka) stAngka.innerText = hargaAkhir;

    if (val !== "" && btn) {
        roomNumber = val;
        btn.disabled = false;
        btn.classList.remove('bg-slate-200', 'text-slate-400');
        btn.classList.add('bg-orange-500', 'text-white', 'shadow-orange-200', 'shadow-xl');
        btn.innerText = "Kirim Pesanan Sekarang 🚀";
        updateTampilanRoom();
    }
}

// 4. RENDERING MENU
function renderMenu() {
    let html = "";
    const filtered = databaseMenu.filter(m => (katAktif === "SEMUA" || m.kategori === katAktif) && m.nama.toLowerCase().includes(queryCari));
    filtered.forEach(m => {
        const q = dataKeranjang[m.nama]?.qty || 0;
        html += `
        <div class="p-3 rounded-[28px] flex items-center transition-all ${q > 0 ? 'bg-orange-50/50 ring-1 ring-orange-200' : 'bg-white shadow-sm border border-slate-50'}">
            <div class="flex-shrink-0 mr-4 relative">
                <img src="${m.foto || 'https://placehold.co/80x80'}" class="w-16 h-16 object-cover rounded-[20px]">
                ${q > 0 ? `<div class="absolute -top-1 -right-1 bg-orange-500 text-white text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center ring-2 ring-white">${q}</div>` : ''}
            </div>
            <div class="min-w-0 flex-1">
                <h3 class="font-black text-slate-800 text-[12px] uppercase italic truncate">${m.nama}</h3>
                <p class="text-orange-600 text-[12px] font-black mt-1">Rp ${m.harga.toLocaleString('id-ID')}</p>
            </div>
            <div class="flex items-center gap-1">
                ${q > 0 ? `<button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', -1)" class="w-8 h-8 bg-white text-red-500 rounded-lg shadow-sm border border-slate-100 font-bold">-</button><span class="w-5 text-center font-black text-xs">${q}</span>` : ''}
                <button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="w-8 h-8 bg-orange-500 text-white rounded-lg shadow-md font-bold">+</button>
            </div>
        </div>`;
    });
    document.getElementById('container-menu').innerHTML = html;
}

function renderBestSeller() {
    let htmlBest = "";
    databaseMenu.slice(0, 5).forEach(m => {
        const q = dataKeranjang[m.nama]?.qty || 0;
        htmlBest += `
        <div class="min-w-[150px] bg-white p-3 rounded-[28px] shadow-sm border border-slate-50">
            <img src="${m.foto || 'https://placehold.co/100x100'}" class="w-full h-24 object-cover rounded-2xl mb-2">
            <p class="font-black text-slate-800 text-[10px] uppercase truncate italic">${m.nama}</p>
            <p class="text-orange-600 font-black text-[11px] mb-2">Rp ${m.harga.toLocaleString('id-ID')}</p>
            <button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="w-full py-2 bg-orange-500 text-white rounded-xl text-[10px] font-black uppercase italic">+ Tambah</button>
        </div>`;
    });
    document.getElementById('container-best-seller').innerHTML = htmlBest;
}

function ubahQty(nama, d) {
    if (!dataKeranjang[nama]) {
        const item = databaseMenu.find(x => x.nama === nama);
        dataKeranjang[nama] = { ...item, qty: 0, catatan: "" };
    }
    dataKeranjang[nama].qty += d;
    if (dataKeranjang[nama].qty <= 0) delete dataKeranjang[nama];
    renderMenu(); renderBestSeller(); updateBar();
}

function updateBar() {
    const arr = Object.values(dataKeranjang);
    const tQty = arr.reduce((a, b) => a + b.qty, 0);
    const tPrice = arr.reduce((a, b) => a + (b.harga * b.qty), 0);
    
    // Sinkronisasi dengan Floating Bar & Popup
    const elBar = document.getElementById('bar-keranjang');
    const elFloating = document.getElementById('btn-keranjang'); // ID Tombol "Lihat Pesanan"
    
    if (tQty > 0) {
        if(elBar) elBar.classList.remove('hidden');
        if(elFloating) elFloating.classList.remove('hidden');
        
        const ringkasan = document.getElementById('ringkasan-singkat');
        if(ringkasan) ringkasan.innerHTML = `<p class="font-black text-lg italic leading-none">${tQty} Item</p><p class="text-[9px] text-orange-400 font-black mt-1">Total: Rp ${tPrice.toLocaleString('id-ID')}</p>`;
        
        // Update angka di tombol Lihat Pesanan
        const jmlItem = document.getElementById('jml-item');
        const totalKeranjang = document.getElementById('total-keranjang');
        if(jmlItem) jmlItem.innerText = tQty;
        if(totalKeranjang) totalKeranjang.innerText = "Rp " + tPrice.toLocaleString('id-ID');
    } else {
        if(elBar) elBar.classList.add('hidden');
        if(elFloating) elFloating.classList.add('hidden');
    }
}

// 5. POPUP SYSTEM
function munculkanPopup(e) {
    if(e) e.preventDefault();
    const arr = Object.values(dataKeranjang);
    if(arr.length === 0) return;

    let h = ""; let t = 0;
    let jMinum = 0; let jMakan = 0;

    arr.forEach((i) => {
        const s = i.harga * i.qty; t += s;
        if(i.kategori.includes("DRINK")) jMinum += i.qty; else jMakan += i.qty;
        h += `
        <div class="bg-slate-50 p-3 rounded-[20px] mb-2 border border-slate-100 shadow-sm">
            <div class="flex justify-between items-center mb-1">
                <p class="font-black text-slate-800 text-[11px] uppercase italic truncate pr-4">${i.nama}</p>
                <span class="font-black text-orange-600 text-[11px]">Rp ${s.toLocaleString('id-ID')}</span>
            </div>
            <div class="flex items-center justify-between">
                <input type="text" onchange="updateCatatanItem('${i.nama.replace(/'/g, "\\'")}', this.value)" value="${i.catatan || ''}" placeholder="Catatan..." class="bg-white border-none rounded-lg py-1 px-3 text-[9px] italic w-2/3 outline-none shadow-inner">
                <div class="flex items-center gap-2 bg-white rounded-lg px-2 py-1 shadow-sm border border-slate-100">
                    <button onclick="ubahQty('${i.nama.replace(/'/g, "\\'")}', -1); munculkanPopup()" class="text-red-500 font-bold">-</button>
                    <span class="text-[10px] font-black">${i.qty}</span>
                    <button onclick="ubahQty('${i.nama.replace(/'/g, "\\'")}', 1); munculkanPopup()" class="text-green-500 font-bold">+</button>
                </div>
            </div>
        </div>`;
    });

    let crossHtml = "";
    let targetKat = (jMinum > jMakan) ? ["SNACK", "FOOD"] : ["DRINK", "JUICE"];
    let saran = databaseMenu.filter(m => !dataKeranjang[m.nama] && targetKat.some(k => m.kategori.includes(k))).sort(() => 0.5 - Math.random()).slice(0, 3);
    
    if (saran.length > 0) {
        crossHtml = `
        <div class="sticky top-0 z-20 bg-white pb-3 mb-3 border-b border-slate-50">
            <p class="text-[9px] font-black text-orange-600 uppercase mb-2 italic">🔥 Tambah ini juga?</p>
            <div class="flex gap-3 overflow-x-auto no-scrollbar">
                ${saran.map(s => `
                    <div onclick="ubahQty('${s.nama.replace(/'/g, "\\'")}', 1); munculkanPopup()" class="min-w-[140px] bg-orange-50/50 p-2.5 rounded-[20px] border-2 border-orange-100 flex items-center gap-2 cursor-pointer shadow-sm">
                        <img src="${s.foto || 'https://placehold.co/60x60'}" class="w-10 h-10 object-cover rounded-xl shadow-inner">
                        <div class="min-w-0"><p class="font-black text-slate-700 text-[8px] uppercase truncate italic">${s.nama}</p><p class="text-orange-600 text-[8px] font-black">+ Tambah</p></div>
                    </div>
                `).join('')}
            </div>
        </div>`;
    }

    const listContainer = document.getElementById('list-checkout');
    const hargaContainer = document.getElementById('harga-akhir');
    if(listContainer) listContainer.innerHTML = crossHtml + `<div>${h}</div>`;
    if(hargaContainer) hargaContainer.innerText = `Rp ${t.toLocaleString('id-ID')}`;
    
    document.getElementById('layar-hitam').classList.add('tampil');
    cekRoomStatus(); 
}

function hilangkanPopup() { document.getElementById('layar-hitam').classList.remove('tampil'); }

// 6. ORDERING
function jalankanKirimWA() {
    const arr = Object.values(dataKeranjang);
    if (arr.length === 0) return;
    const finalRoom = document.getElementById('input-room-final').value;
    if(!finalRoom) { alert("Pilih nomor room dulu ya!"); return; }

    const t = arr.reduce((a, b) => a + (b.harga * b.qty), 0);
    let msg = `*PESANAN BARU - ROOM ${finalRoom}*%0A---------------------------%0A`;
    arr.forEach(i => { msg += `• *${i.nama}* (${i.qty}x)%0A`; if(i.catatan) msg += `  _Cat: ${i.catatan}_%0A`; });
    msg += `---------------------------%0A*TOTAL: Rp ${t.toLocaleString('id-ID')}*`;
    
    window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`, '_blank');
    
    // Simpan riwayat & Reset
    setTimeout(() => { 
        dataKeranjang = {}; hilangkanPopup(); renderMenu(); renderBestSeller(); updateBar(); 
        document.getElementById('notif-sukses').classList.add('tampil');
    }, 1000);
}

// 7. UTILITAS LAINNYA
function gantiKat(k) { katAktif = k; renderMenu(); renderTabs(); }
function renderTabs() {
    let h = "";
    listKategoriTetap.forEach(kt => {
        const active = kt === katAktif;
        h += `<button onclick="gantiKat('${kt}')" class="px-6 py-3 text-[10px] uppercase font-black italic rounded-full transition-all ${active ? 'bg-orange-500 text-white shadow-lg shadow-orange-200' : 'bg-white text-slate-400 border border-slate-100'}">${kt}</button>`;
    });
    document.getElementById('tabs-kategori').innerHTML = h;
}
function cekInputCari() { queryCari = document.getElementById('input-cari').value.toLowerCase(); renderMenu(); }
function updateCatatanItem(nama, val) { if (dataKeranjang[nama]) dataKeranjang[nama].catatan = val; }
function resetKeranjang() { if (confirm("Kosongkan keranjang?")) { dataKeranjang = {}; hilangkanPopup(); renderMenu(); renderBestSeller(); updateBar(); } }

window.onload = () => {
    inisialisasiWiFi();
    if(proteksiSesi()) { 
        deteksiRoom(); 
        ambilData(); 
    }
};
    </script>
