<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Happy Puppy Samarinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow-x: hidden; touch-action: pan-y; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { background-color: #f97316; color: white; border-radius: 9999px; }
        
        #layar-hitam {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 9999;
            align-items: flex-end;
        }
        #layar-hitam.tampil { display: flex; }
        .konten-putih {
            background: white;
            width: 100%;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        #layar-hitam.tampil .konten-putih { transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-100 pb-40 font-sans text-gray-900 w-full">

    <div class="h-32 bg-slate-900 relative w-full overflow-hidden">
        <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800" class="w-full h-full object-cover opacity-30">
        <div class="absolute bottom-4 left-5 text-white">
            <h1 class="text-lg font-bold text-orange-400 uppercase leading-tight italic">Happy Puppy <br>Samarinda</h1>
        </div>
    </div>

    <div class="sticky top-0 bg-white shadow-sm z-40 overflow-x-auto no-scrollbar flex whitespace-nowrap px-4 py-3 gap-2" id="tabs-kategori"></div>

    <div class="p-4 w-full">
        <div id="container-menu" class="space-y-3"></div>
    </div>

    <div id="bar-keranjang" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-zinc-900 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center hidden z-50 border border-white/10">
        <div id="ringkasan-singkat"></div>
        <button type="button" onclick="munculkanPopup(event)" class="bg-orange-500 px-5 py-2 rounded-xl font-bold text-[11px] uppercase shadow-lg active:scale-90 transition-all">
            Lihat Pesanan
        </button>
    </div>

    <div id="layar-hitam" onclick="hilangkanPopup()">
        <div class="konten-putih" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-5 flex-shrink-0">
                <div>
                    <h2 class="font-black text-xl text-gray-800 leading-none">Konfirmasi Order</h2>
                    <div id="info-room-popup" class="mt-2 inline-block bg-orange-500 text-white px-3 py-1 rounded text-[11px] font-black uppercase tracking-widest">
                        ROOM: 101
                    </div>
                </div>
                <button onclick="resetKeranjang()" class="text-red-500 text-[10px] font-bold uppercase border border-red-100 px-3 py-1 rounded-lg active:bg-red-50">Reset</button>
            </div>
            
            <div id="list-checkout" class="space-y-5 overflow-y-auto mb-4 pr-1 flex-1"></div>

            <div class="border-t pt-4 flex-shrink-0">
                <div class="flex justify-between items-center mb-5 px-1">
                    <span class="font-bold text-gray-400 text-sm uppercase tracking-tighter">Estimasi Total</span>
                    <span id="harga-akhir" class="font-black text-xl text-orange-600"></span>
                </div>

                <button type="button" onclick="jalankanKirimWA()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                    KIRIM PESANAN KE WA
                </button>
            </div>
        </div>
    </div>

    <script>
        const URL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv"; 
        
        let databaseMenu = [];
        let dataKeranjang = {}; 
        let katAktif = "SEMUA";
        let roomNumber = "101"; 

        function deteksiRoom() {
            const params = new URLSearchParams(window.location.search);
            const r = params.get('room');
            if (r) { roomNumber = r.toUpperCase(); }
            document.getElementById('info-room-popup').innerText = "ROOM: " + roomNumber;
        }

        async function ambilData() {
            try {
                const res = await fetch(URL_SHEETS + "&t=" + new Date().getTime());
                const text = await res.text();
                const baris = text.split(/\r?\n/).slice(1);
                databaseMenu = [];
                let setKategori = new Set(["SEMUA"]);
                baris.forEach(r => {
                    let k = r.split(",");
                    if (k.length >= 2) {
                        const nama = k[0]?.replace(/"/g, '').trim();
                        const harga = parseInt(k[1]?.replace(/[^0-9]/g, '')) || 0;
                        const kategori = k[2]?.replace(/"/g, '').trim().toUpperCase() || "LAINNYA";
                        if (nama && harga > 0) {
                            databaseMenu.push({ nama, harga, kategori });
                            setKategori.add(kategori);
                        }
                    }
                });
                let htmlKat = "";
                Array.from(setKategori).forEach(kt => {
                    const cls = kt === katAktif ? "active-tab" : "bg-white text-gray-400 border border-gray-100 rounded-full";
                    htmlKat += `<button onclick="gantiKat('${kt}')" class="px-5 py-2 text-[10px] font-bold uppercase ${cls}">${kt}</button>`;
                });
                document.getElementById('tabs-kategori').innerHTML = htmlKat;
                renderMenu();
            } catch (e) { console.error(e); }
        }

        function gantiKat(k) { katAktif = k; ambilData(); }

        function renderMenu() {
            let html = "";
            const filtered = katAktif === "SEMUA" ? databaseMenu : databaseMenu.filter(m => m.kategori === katAktif);
            filtered.forEach(m => {
                const q = dataKeranjang[m.nama]?.qty || 0;
                html += `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-50">
                    <div class="min-w-0 flex-1 pr-3">
                        <h3 class="font-bold text-gray-800 text-sm truncate">${m.nama}</h3>
                        <p class="text-orange-600 text-[11px] font-black mt-1">Rp ${m.harga.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-center gap-2 bg-gray-50 p-1 rounded-xl">
                        ${q > 0 ? `<button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', -1)" class="w-8 h-8 rounded-lg bg-white text-orange-500 font-bold">-</button>
                        <span class="font-bold text-xs w-4 text-center">${q}</span>` : ''}
                        <button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="bg-orange-500 text-white w-8 h-8 rounded-lg font-bold shadow-md shadow-orange-100">+</button>
                    </div>
                </div>`;
            });
            document.getElementById('container-menu').innerHTML = html;
        }

        function ubahQty(nama, d) {
            if (!dataKeranjang[nama]) {
                const item = databaseMenu.find(x => x.nama === nama);
                dataKeranjang[nama] = { ...item, qty: 0, catatan: "" };
            }
            dataKeranjang[nama].qty += d;
            if (dataKeranjang[nama].qty <= 0) delete dataKeranjang[nama];
            renderMenu();
            updateBar();
        }

        function updateBar() {
            const arr = Object.values(dataKeranjang);
            const tQty = arr.reduce((a, b) => a + b.qty, 0);
            const tPrice = arr.reduce((a, b) => a + (b.harga * b.qty), 0);
            const el = document.getElementById('bar-keranjang');
            if (tQty > 0) {
                el.classList.remove('hidden');
                document.getElementById('ringkasan-singkat').innerHTML = `<p class="font-black text-sm">${tQty} Menu Terpilih</p><p class="text-[10px] text-orange-400 font-bold uppercase">Rp ${tPrice.toLocaleString('id-ID')}</p>`;
            } else { el.classList.add('hidden'); }
        }

        function munculkanPopup(e) {
            e.preventDefault();
            const arr = Object.values(dataKeranjang);
            let h = ""; let t = 0;
            arr.forEach((i) => {
                const s = i.harga * i.qty; t += s;
                h += `
                <div class="space-y-2 border-b border-gray-100 pb-3">
                    <div class="flex justify-between items-start">
                        <div class="flex-1 pr-4">
                            <p class="font-bold text-gray-800 text-[13px] leading-tight">${i.nama}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase mt-1">${i.qty}x @Rp ${i.harga.toLocaleString('id-ID')}</p>
                        </div>
                        <span class="font-black text-gray-800 text-[13px]">Rp ${s.toLocaleString('id-ID')}</span>
                    </div>
                    <input type="text" 
                        onchange="updateCatatanItem('${i.nama.replace(/'/g, "\\'")}', this.value)"
                        value="${i.catatan || ''}"
                        placeholder="Contoh: Es pisah, pedas, dll..." 
                        class="w-full bg-gray-50 border border-gray-100 rounded-xl py-2 px-3 text-[11px] outline-none focus:border-orange-400 italic text-gray-500">
                </div>`;
            });
            document.getElementById('list-checkout').innerHTML = h;
            document.getElementById('harga-akhir').innerText = `Rp ${t.toLocaleString('id-ID')}`;
            document.getElementById('layar-hitam').classList.add('tampil');
        }

        function updateCatatanItem(nama, val) {
            if (dataKeranjang[nama]) dataKeranjang[nama].catatan = val;
        }

        function resetKeranjang() {
            if (confirm("Kosongkan semua pesanan?")) {
                dataKeranjang = {};
                hilangkanPopup();
                renderMenu();
                updateBar();
            }
        }

        function hilangkanPopup() {
            document.getElementById('layar-hitam').classList.remove('tampil');
        }

        function jalankanKirimWA() {
            const arr = Object.values(dataKeranjang);
            if (arr.length === 0) return;
            const wa = "6285348773757";
            const t = arr.reduce((a, b) => a + (b.harga * b.qty), 0);
            
            // Format Pesan WhatsApp yang Lebih Menarik
            let msg = `*PESANAN BARU - HAPPY PUPPY* 🎤%0A`;
            msg += `------------------------------------------%0A`;
            msg += `📍 *ROOM:* ${roomNumber}%0A`;
            msg += `------------------------------------------%0A%0A`;
            
            arr.forEach(i => {
                msg += `✅ *${i.nama}* (${i.qty}x)%0A`;
                if (i.catatan) msg += `   _Note: ${i.catatan}_%0A`;
                msg += `%0A`;
            });

            msg += `------------------------------------------%0A`;
            msg += `💰 *TOTAL ESTIMASI: Rp ${t.toLocaleString('id-ID')}*%0A`;
            msg += `------------------------------------------%0A%0A`;
            msg += `_Mohon ditunggu ya kak, kru kami akan segera memproses pesanan Anda. Terima kasih!_ 🙏✨`;

            window.open(`https://wa.me/${wa}?text=${msg}`, '_blank');
        }

        deteksiRoom();
        ambilData();
    </script>
</body>
</html>
