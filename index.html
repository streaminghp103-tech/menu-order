<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Happy Puppy</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
.active-tab {
    background:#f97316;
    color:white;
    border-radius:999px;
}
</style>
</head>

<body class="bg-gray-50">

<div class="p-5">
    <h1 class="text-xl font-bold mb-3">Happy Puppy Menu</h1>

    <input id="input-cari" oninput="cekInputCari()" 
    class="w-full p-3 border rounded-xl mb-4"
    placeholder="Cari menu...">

    <div id="tabs-kategori" class="flex gap-2 mb-4 overflow-x-auto"></div>

    <div id="container-menu"></div>
</div>

<div id="bar-keranjang" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-black text-white p-4 rounded-xl hidden">
    <span id="ringkasan"></span>
    <button onclick="munculkanPopup()" class="ml-3 bg-orange-500 px-3 py-1 rounded">Lihat</button>
</div>

<script>
const WA_NUMBER = "6285348773757";

let databaseMenu = [];
let dataKeranjang = {};

let listKategoriTetap = [];
let katAktif = "SEMUA";
let queryCari = "";
let roomNumber = "--";

function proteksiSesi() { return true; }

// ================= DATA =================
async function ambilData() {
    document.getElementById("container-menu").innerHTML = "Loading...";

    const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv");
    const text = await res.text();

    const rows = text.split("\n").slice(1);
    let kategoriSet = new Set();

    databaseMenu = [];

    rows.forEach(r=>{
        let k = r.split(",");
        if(k.length>=2){
            let nama = k[0].trim();
            let harga = parseInt(k[1]) || 0;
            let kategori = (k[2]||"LAINNYA").toUpperCase();

            databaseMenu.push({nama,harga,kategori});
            kategoriSet.add(kategori);
        }
    });

    listKategoriTetap = ["SEMUA",...kategoriSet];

    renderTabs();
    renderMenu();
}

// ================= TABS =================
function renderTabs(){
    let html="";
    listKategoriTetap.forEach(k=>{
        html+=`
        <button onclick="gantiKat('${k}')"
        class="px-4 py-2 text-sm ${katAktif===k?'active-tab':'bg-white'}">
        ${k}
        </button>`;
    });
    document.getElementById("tabs-kategori").innerHTML=html;
}

function gantiKat(k){
    katAktif=k;
    renderTabs();
    renderMenu();
}

// ================= MENU =================
function renderMenu(){
    let html="";

    let filtered = databaseMenu.filter(m=>{
        return (katAktif==="SEMUA" || m.kategori===katAktif) &&
        m.nama.toLowerCase().includes(queryCari);
    });

    if(filtered.length===0){
        html="Menu tidak ada";
    }

    filtered.forEach(m=>{
        let qty = dataKeranjang[m.nama]?.qty || 0;

        html+=`
        <div class="bg-white p-3 mb-2 rounded-xl flex justify-between">
            <div>
                <p class="font-bold">${m.nama}</p>
                <p>Rp ${m.harga}</p>
            </div>

            <div>
                ${qty>0 ? `
                <button onclick="ubahQty('${m.nama}',-1)">-</button>
                ${qty}
                `:""}
                <button onclick="ubahQty('${m.nama}',1)">+</button>
            </div>
        </div>`;
    });

    document.getElementById("container-menu").innerHTML=html;
}

// ================= KERANJANG =================
function ubahQty(nama,d){
    if(!dataKeranjang[nama]){
        let item = databaseMenu.find(x=>x.nama===nama);
        dataKeranjang[nama]={...item,qty:0};
    }

    dataKeranjang[nama].qty+=d;

    if(dataKeranjang[nama].qty<=0){
        delete dataKeranjang[nama];
    }

    renderMenu();
    updateBar();
}

function updateBar(){
    let items = Object.values(dataKeranjang);

    let total = items.reduce((a,b)=>a+b.qty,0);

    if(total>0){
        document.getElementById("bar-keranjang").classList.remove("hidden");
        document.getElementById("ringkasan").innerText = total+" item";
    }else{
        document.getElementById("bar-keranjang").classList.add("hidden");
    }
}

// ================= SEARCH =================
function cekInputCari(){
    queryCari = document.getElementById("input-cari").value.toLowerCase();
    renderMenu();
}

// ================= ORDER =================
function munculkanPopup(){
    let items = Object.values(dataKeranjang);
    if(items.length===0) return;

    let total = items.reduce((a,b)=>a+(b.harga*b.qty),0);

    let msg = "*Pesanan Baru*%0A";
    items.forEach(i=>{
        msg+=`${i.nama} (${i.qty}x)%0A`;
    });

    msg+=`Total: Rp ${total}`;

    window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`);
}

// ================= INIT =================
window.onload = ()=>{
    if(proteksiSesi()){
        ambilData();
    }
};
</script>

</body>
</html>
