<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Happy Puppy Samarinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; 
            touch-action: pan-y; 
            background-color: #f8fafc;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Tab Aktif dengan gradasi lebih smooth */
        .active-tab { 
            background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
            color: white; 
            border-radius: 9999px;
            box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.4);
            border: transparent !important;
        }
        
        /* Animasi Lembut untuk Popup */
        #layar-hitam, #layar-bantuan, #notif-sukses {
            display: none; position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px);
            z-index: 9999; align-items: flex-end;
        }
        #layar-hitam.tampil, #layar-bantuan.tampil, #notif-sukses.tampil { display: flex; }
        
        .konten-putih {
            background: white; width: 100%; border-radius: 40px 40px 0 0;
            padding: 30px 24px; transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            max-height: 92vh; display: flex; flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .tampil .konten-putih { transform: translateY(0); }
        
        /* Efek Kartu Menu */
        .menu-card {
            transition: all 0.3s ease;
            border: 1.5px solid transparent;
        }
        .menu-card:active { transform: scale(0.97); }
        .card-active {
            border-color: #f97316;
            background: #fff7ed;
        }

        /* Floating Button Animation */
        @keyframes bounce-subtle {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -5px); }
        }
        #bar-keranjang {
            animation: bounce-subtle 3s infinite ease-in-out;
        }

        /* Badge Hot */
        .badge-hot {
            position: absolute; top: 10px; left: 10px;
            background: linear-gradient(45deg, #ef4444, #f97316);
            color: white; font-size: 9px; font-weight: 800;
            padding: 4px 10px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
            z-index: 20;
        }

        /* Custom Input */
        .search-container focus-within {
            background: white !important;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="pb-40">

    <div class="bg-slate-900 relative w-full overflow-hidden p-6 pt-10 rounded-b-[50px] shadow-2xl">
        <div class="absolute top-0 right-0 w-64 h-64 bg-orange-500/20 rounded-full blur-[80px] -mr-32 -mt-32"></div>
        <div class="absolute bottom-0 left-0 w-48 h-48 bg-blue-500/10 rounded-full blur-[60px] -ml-24 -mb-24"></div>
        
        <div class="relative z-10 flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-white leading-none tracking-tighter uppercase italic">HAPPY<br><span class="text-orange-500">PUPPY</span></h1>
                <p id="info-room-header" class="mt-2 text-[10px] font-bold text-orange-200/80 tracking-[0.3em] uppercase">📍 Samarinda • Room --</p>
            </div>
            <button onclick="bukaBantuan()" class="w-14 h-14 bg-white/10 hover:bg-white/20 border border-white/20 rounded-[22px] flex items-center justify-center backdrop-blur-xl transition-all active:scale-90 shadow-xl">
                <span class="text-2xl text-white">🆘</span>
            </button>
        </div>

        <div class="relative z-10 space-y-4">
            <div class="search-container bg-white/10 border border-white/20 backdrop-blur-md rounded-2xl flex items-center px-5 transition-all duration-300">
                <span class="text-xl">🔍</span>
                <input type="text" id="input-cari" oninput="filterMenu()" placeholder="Mau makan/minum apa hari ini?" class="w-full py-4 bg-transparent text-sm outline-none font-semibold text-white placeholder:text-white/40 italic">
            </div>

            <div id="widget-pesanan-saya" class="hidden animate-in fade-in zoom-in duration-500">
                <div class="bg-gradient-to-r from-orange-600/20 to-orange-400/10 border border-orange-500/30 backdrop-blur-lg rounded-3xl p-4 shadow-inner">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <span class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
                            </span>
                            <span class="text-[10px] font-black text-orange-100 uppercase tracking-widest">Pesanan Anda</span>
                        </div>
                        <span id="jumlah-riwayat" class="bg-white/10 border border-white/20 text-white text-[10px] font-black px-3 py-1 rounded-full backdrop-blur-md">0</span>
                    </div>
                    <div id="list-riwayat-luar" class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="section-best-seller" class="mt-8 px-6">
        <div class="flex justify-between items-end mb-5">
            <h2 class="text-xs font-black uppercase text-slate-400 tracking-[0.2em] flex items-center gap-2">
                🔥 Paling Banyak Dipesan
            </h2>
        </div>
        <div id="container-best-seller" class="flex gap-5 overflow-x-auto no-scrollbar pb-4"></div>
    </div>

    <div class="sticky top-0 bg-slate-50/90 backdrop-blur-xl z-40 px-6 py-5 overflow-x-auto no-scrollbar flex gap-3" id="tabs-kategori"></div>

    <div class="px-6 space-y-5" id="container-menu"></div>

    <div id="bar-keranjang" class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[85%] max-w-md bg-slate-900 text-white p-5 rounded-[30px] shadow-[0_20px_50px_rgba(0,0,0,0.3)] flex justify-between items-center hidden z-50 border border-white/10 backdrop-blur-xl">
        <div id="ringkasan-singkat"></div>
        <button type="button" onclick="munculkanPopup(event)" class="bg-gradient-to-r from-orange-400 to-orange-600 px-8 py-4 rounded-2xl font-black text-[11px] uppercase tracking-wider shadow-lg shadow-orange-500/40 active:scale-95 transition-all">
            Lihat Pesanan
        </button>
    </div>

    <div id="layar-hitam" onclick="hilangkanPopup()">
        <div class="konten-putih" onclick="event.stopPropagation()">
            <div class="w-16 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-black text-slate-900 uppercase italic leading-none">Konfirmasi</h2>
                    <p id="info-room-popup" class="text-[10px] font-bold text-orange-500 mt-2 uppercase tracking-widest">Room --</p>
                </div>
                <button onclick="resetKeranjang()" class="text-[10px] font-black text-red-500 bg-red-50 px-5 py-3 rounded-2xl uppercase tracking-widest">Kosongkan</button>
            </div>
            
            <div id="list-checkout" class="space-y-4 overflow-y-auto mb-6 pr-2 flex-1 no-scrollbar"></div>
            
            <div class="border-t border-slate-100 pt-6 space-y-5">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Total Bayar</span>
                    <span id="harga-akhir" class="text-3xl font-black text-slate-900 italic"></span>
                </div>
                <button type="button" onclick="jalankanKirimWA()" class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-[22px] font-black text-sm transition-all uppercase flex items-center justify-center gap-4 shadow-2xl shadow-green-600/30">
                    Kirim Pesanan ke Staff 🚀
                </button>
            </div>
        </div>
    </div>

    <div id="notif-sukses" onclick="tutupNotif()">
        <div class="konten-putih items-center text-center pb-12" onclick="event.stopPropagation()">
            <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner animate-bounce">✓</div>
            <h2 class="text-2xl font-black text-slate-900 uppercase italic">Berhasil Terkirim!</h2>
            <p class="text-slate-500 text-sm px-10 mt-2 leading-relaxed mb-10">Staf kami akan segera mengantarkan pesanan ke <span class="font-black text-orange-500">Room <span class="no-room">--</span></span>.</p>
            <button onclick="tutupNotif()" class="w-full bg-slate-900 text-white py-5 rounded-[22px] font-black text-sm uppercase tracking-widest">Oke, Mantap!</button>
        </div>
    </div>

    <script>
        // --- LOGIKA PROGRAM (DIPERTAHANKAN) ---
        const URL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv"; 
        const WA_NUMBER = "6285348773757";
        
        let databaseMenu = [];
        let listKategoriTetap = [];
        let dataKeranjang = {}; 
        let riwayatPesananLokal = [];
        let katAktif = "SEMUA";
        let roomNumber = "101"; 
        let queryCari = "";

        function deteksiRoom() {
            const params = new URLSearchParams(window.location.search);
            const r = params.get('room');
            if (r) roomNumber = r.toUpperCase();
            document.querySelectorAll('.no-room').forEach(el => el.innerText = roomNumber);
            document.getElementById('info-room-header').innerText = "📍 Samarinda • Room " + roomNumber;
            document.getElementById('info-room-popup').innerText = "Room " + roomNumber;
        }

        async function ambilData() {
            try {
                const res = await fetch(URL_SHEETS + "&t=" + new Date().getTime());
                const text = await res.text();
                const baris = text.split(/\r?\n/).slice(1);
                databaseMenu = [];
                let setKategori = new Set();
                baris.forEach(r => {
                    let k = r.split(",");
                    if (k.length >= 2) {
                        const nama = k[0]?.replace(/"/g, '').trim();
                        const harga = parseInt(k[1]?.replace(/[^0-9]/g, '')) || 0;
                        const kategori = k[2]?.replace(/"/g, '').trim().toUpperCase() || "LAINNYA";
                        const foto = k[3]?.replace(/"/g, '').trim() || "";
                        const deskripsi = k[4]?.replace(/"/g, '').trim() || ""; 
                        if (nama && harga > 0) {
                            databaseMenu.push({ nama, harga, kategori, foto, deskripsi });
                            setKategori.add(kategori);
                        }
                    }
                });
                listKategoriTetap = ["SEMUA", ...Array.from(setKategori).sort()];
                renderTabs(); renderBestSeller(); renderMenu();
            } catch (e) { console.error(e); }
        }

        function filterMenu() {
            queryCari = document.getElementById('input-cari').value.toLowerCase();
            document.getElementById('section-best-seller').style.display = queryCari.length > 0 ? 'none' : 'block';
            renderMenu();
        }

        function renderTabs() {
            let htmlKat = "";
            listKategoriTetap.forEach(kt => {
                const cls = kt === katAktif ? "active-tab" : "bg-white text-slate-400 font-bold rounded-2xl border border-slate-100 shadow-sm";
                htmlKat += `<button onclick="gantiKat('${kt}')" class="px-6 py-4 text-[10px] uppercase tracking-widest transition-all shrink-0 ${cls}">${kt}</button>`;
            });
            document.getElementById('tabs-kategori').innerHTML = htmlKat;
        }

        function renderBestSeller() {
            let htmlBest = "";
            databaseMenu.slice(0, 6).forEach(m => {
                const imgTag = m.foto ? `<img src="${m.foto}" class="w-full h-32 object-cover rounded-[24px] mb-4 shadow-lg">` : `<div class="w-full h-32 bg-orange-100 rounded-[24px] mb-4 flex items-center justify-center text-3xl">🍲</div>`;
                htmlBest += `
                <div onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="min-w-[170px] bg-white p-3 rounded-[32px] shadow-md border border-slate-50 relative active:scale-95 transition-all">
                    <span class="badge-hot text-[8px]">FAVORIT</span>
                    ${imgTag}
                    <div class="px-1">
                        <p class="font-black text-slate-800 text-[12px] leading-tight mb-2 truncate uppercase italic">${m.nama}</p>
                        <p class="text-orange-600 font-black text-[13px] italic">Rp ${m.harga.toLocaleString('id-ID')}</p>
                    </div>
                </div>`;
            });
            document.getElementById('container-best-seller').innerHTML = htmlBest;
        }

        function renderMenu() {
            let html = "";
            const filtered = databaseMenu.filter(m => (katAktif === "SEMUA" || m.kategori === katAktif) && m.nama.toLowerCase().includes(queryCari));
            if (filtered.length === 0) html = `<div class="py-20 text-center text-slate-400 font-bold text-xs uppercase tracking-widest italic opacity-50">Menu tidak tersedia...</div>`;
            filtered.forEach(m => {
                const q = dataKeranjang[m.nama]?.qty || 0;
                const cardState = q > 0 ? 'card-active shadow-orange-100' : 'bg-white';
                const imgTag = m.foto ? `<img src="${m.foto}" class="w-24 h-24 object-cover rounded-2xl shadow-md">` : `<div class="w-24 h-24 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl">🥘</div>`;
                html += `
                <div class="menu-card p-4 rounded-[30px] shadow-sm flex items-center border border-slate-50 transition-all ${cardState}">
                    <div class="flex-shrink-0 mr-4">${imgTag}</div>
                    <div class="min-w-0 flex-1">
                        <h3 class="font-black text-slate-800 text-[14px] truncate uppercase italic leading-none">${m.nama}</h3>
                        <p class="text-[10px] text-slate-400 mt-2 line-clamp-1 italic font-medium">${m.deskripsi || 'Nikmati kelezatan menu kami.'}</p>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-orange-600 text-[15px] font-black italic">Rp ${m.harga.toLocaleString('id-ID')}</span>
                            <div class="flex items-center gap-3 bg-slate-100 p-1 rounded-xl">
                                ${q > 0 ? `<button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', -1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-red-500 font-black">-</button>
                                <span class="font-black text-xs px-1 text-slate-700">${q}</span>` : ''}
                                <button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="w-8 h-8 flex items-center justify-center bg-orange-500 rounded-lg text-white font-black shadow-md shadow-orange-500/30 active:scale-90">+</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('container-menu').innerHTML = html;
        }

        function gantiKat(k) { katAktif = k; renderMenu(); renderTabs(); }
        
        function ubahQty(nama, d) {
            if (!dataKeranjang[nama]) {
                const item = databaseMenu.find(x => x.nama === nama);
                dataKeranjang[nama] = { ...item, qty: 0, catatan: "" };
            }
            dataKeranjang[nama].qty += d;
            if (dataKeranjang[nama].qty <= 0) delete dataKeranjang[nama];
            renderMenu(); renderBestSeller(); updateBar();
        }

        function updateBar() {
            const arr = Object.values(dataKeranjang);
            const tQty = arr.reduce((a, b) => a + b.qty, 0);
            const tPrice = arr.reduce((a, b) => a + (b.harga * b.qty), 0);
            const el = document.getElementById('bar-keranjang');
            if (tQty > 0) {
                el.classList.remove('hidden');
                document.getElementById('ringkasan-singkat').innerHTML = `<p class="font-black text-xl italic leading-none">${tQty} Menu</p><p class="text-[10px] text-orange-400 font-bold uppercase tracking-[0.2em] mt-1">Rp ${tPrice.toLocaleString('id-ID')}</p>`;
            } else { el.classList.add('hidden'); }
        }

        function munculkanPopup(e) {
            if(e) e.preventDefault();
            const arr = Object.values(dataKeranjang);
            let h = ""; let t = 0;
            arr.forEach((i) => {
                const s = i.harga * i.qty; t += s;
                h += `
                <div class="bg-slate-50 p-5 rounded-[28px] border border-slate-100 flex flex-col gap-4">
                    <div class="flex justify-between items-center">
                        <div class="flex-1 pr-4">
                            <p class="font-black text-slate-800 text-[13px] uppercase italic leading-none">${i.nama}</p>
                            <p class="text-orange-600 font-black text-xs mt-2 italic">Rp ${s.toLocaleString('id-ID')}</p>
                        </div>
                        <div class="flex items-center gap-4 bg-white px-3 py-2 rounded-2xl shadow-sm border border-slate-100">
                            <button onclick="ubahQty('${i.nama.replace(/'/g, "\\'")}', -1); munculkanPopup()" class="text-red-500 font-black">-</button>
                            <span class="text-xs font-black text-slate-700">${i.qty}</span>
                            <button onclick="ubahQty('${i.nama.replace(/'/g, "\\'")}', 1); munculkanPopup()" class="text-green-500 font-black">+</button>
                        </div>
                    </div>
                    <input type="text" onchange="updateCatatanItem('${i.nama.replace(/'/g, "\\'")}', this.value)" value="${i.catatan || ''}" placeholder="Ada catatan khusus? (Contoh: Tidak pedas)" class="w-full bg-white border border-slate-200 rounded-[18px] py-3 px-5 text-[11px] italic focus:border-orange-500 outline-none transition-all">
                </div>`;
            });
            document.getElementById('list-checkout').innerHTML = h || `<p class="text-center py-10 text-slate-300 font-bold uppercase text-[10px] italic">Kosong...</p>`;
            document.getElementById('harga-akhir').innerText = `Rp ${t.toLocaleString('id-ID')}`;
            document.getElementById('layar-hitam').classList.add('tampil');
        }

        function updateCatatanItem(nama, val) { if (dataKeranjang[nama]) dataKeranjang[nama].catatan = val; }
        function hilangkanPopup() { document.getElementById('layar-hitam').classList.remove('tampil'); }
        function resetKeranjang() { if (confirm("Kosongkan semua pesanan?")) { dataKeranjang = {}; hilangkanPopup(); renderMenu(); renderBestSeller(); updateBar(); } }
        function bukaBantuan() { document.getElementById('layar-bantuan').classList.add('tampil'); }
        function tutupBantuan() { document.getElementById('layar-bantuan').classList.remove('tampil'); }
        
        function kirimBantuan(jenis) {
            window.open(`https://wa.me/${WA_NUMBER}?text=Halo Happy Puppy Samarinda,%0ASaya tamu dari *ROOM ${roomNumber}*%0A*MINTA BANTUAN:* ${jenis}.`, '_blank');
            tutupBantuan();
        }

        function jalankanKirimWA() {
            const arr = Object.values(dataKeranjang);
            if (arr.length === 0) return;
            const t = arr.reduce((a, b) => a + (b.harga * b.qty), 0);
            let msg = `Halo Happy Puppy Samarinda,%0A%0ASaya dari *ROOM ${roomNumber}* ingin memesan:%0A%0A`;
            arr.forEach(i => { msg += `- *${i.nama}* (${i.qty}x)%0A${i.catatan ? `  _(Catatan: ${i.catatan})_%0A` : ''}`; });
            msg += `%0A*TOTAL ESTIMASI: Rp ${t.toLocaleString('id-ID')}*%0A%0AMohon segera diproses, terima kasih!`;
            
            window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`, '_blank');
            
            arr.forEach(item => {
                const index = riwayatPesananLokal.findIndex(r => r.nama === item.nama);
                if (index > -1) riwayatPesananLokal[index].qty += item.qty;
                else riwayatPesananLokal.push({ nama: item.nama, qty: item.qty });
            });

            setTimeout(() => {
                hilangkanPopup();
                dataKeranjang = {}; 
                renderMenu(); renderBestSeller(); updateBar();
                updateWidgetRiwayat();
                document.getElementById('notif-sukses').classList.add('tampil');
            }, 1000);
        }

        function updateWidgetRiwayat() {
            const widget = document.getElementById('widget-pesanan-saya');
            const container = document.getElementById('list-riwayat-luar');
            const badge = document.getElementById('jumlah-riwayat');

            if (riwayatPesananLokal.length > 0) {
                widget.classList.remove('hidden');
                badge.innerText = riwayatPesananLokal.length;
                let html = "";
                riwayatPesananLokal.forEach(r => {
                    html += `
                    <div class="bg-white/95 px-4 py-3 rounded-2xl flex items-center gap-3 shrink-0 shadow-lg border border-orange-200">
                        <span class="text-xs font-black text-orange-600">${r.qty}x</span>
                        <span class="text-[10px] font-black text-slate-800 uppercase italic truncate max-w-[100px]">${r.nama}</span>
                        <div class="w-5 h-5 bg-green-500 rounded-full flex items-center justify-center text-[10px] text-white">✓</div>
                    </div>`;
                });
                container.innerHTML = html;
            }
        }

        function tutupNotif() { document.getElementById('notif-sukses').classList.remove('tampil'); }

        deteksiRoom(); ambilData();
    </script>
</body>
</html>
