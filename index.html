<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Happy Puppy Samarinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; touch-action: pan-y; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Tab Aktif */
        .active-tab { 
            background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
            color: white; border-radius: 9999px;
            box-shadow: 0 8px 15px rgba(249, 115, 22, 0.3);
            border: transparent !important;
        }
        
        /* Overlay Base */
        .overlay-mask {
            display: none; position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(10px);
            z-index: 9999; align-items: flex-end;
        }
        .overlay-mask.tampil { display: flex; }
        
        .konten-putih {
            background: white; width: 100%; border-radius: 40px 40px 0 0;
            padding: 24px; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            max-height: 90vh; display: flex; flex-direction: column;
        }
        .tampil .konten-putih { transform: translateY(0); }
        
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
        .animate-order { animation: pulse-orange 2s infinite; }

        .badge-hot {
            position: absolute; top: 8px; left: 8px;
            background: #ef4444; color: white; font-size: 8px;
            font-weight: 900; padding: 3px 10px; border-radius: 8px;
            z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body class="pb-40">

    <div class="bg-slate-900 relative w-full overflow-hidden p-6 pt-10 rounded-b-[45px] shadow-2xl">
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent"></div>
        <div class="relative z-10 flex justify-between items-start mb-8">
            <div class="text-white">
                <h1 class="text-3xl font-black uppercase italic leading-none tracking-tighter">Happy Puppy<br><span class="text-orange-500">Samarinda</span></h1>
                <div id="info-room-header" class="mt-3 inline-block bg-white/10 border border-white/20 px-4 py-1.5 rounded-full text-[10px] font-black uppercase backdrop-blur-md text-orange-200 tracking-widest">📍 Room: --</div>
            </div>
            <button onclick="bukaBantuan()" class="bg-white/10 border border-white/20 text-white p-4 rounded-2xl backdrop-blur-md active:scale-90 transition-all text-2xl shadow-xl">🆘</button>
        </div>

        <div class="relative z-10 space-y-4">
            <div class="bg-white/10 border border-white/20 backdrop-blur-md rounded-2xl flex items-center px-5 transition-all focus-within:bg-white group">
                <span class="text-orange-400 mr-3 text-lg">🔍</span>
                <input type="text" id="input-cari" oninput="filterMenu()" placeholder="Cari menu favorit..." class="w-full py-4 bg-transparent text-sm outline-none font-semibold text-white focus:text-slate-800 placeholder:text-white/50 focus:placeholder:text-slate-400 italic">
            </div>

            <div id="widget-pesanan-saya" class="hidden animate-in fade-in slide-in-from-top-2 duration-500">
                <div class="bg-orange-500/10 border border-orange-500/20 backdrop-blur-md rounded-2xl p-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-black text-orange-400 uppercase tracking-widest flex items-center gap-2">
                            <span class="flex h-2 w-2 rounded-full bg-orange-500 animate-pulse"></span> Pesanan Terkirim
                        </span>
                        <span id="jumlah-riwayat" class="bg-orange-500 text-white text-[9px] font-black px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <div id="list-riwayat-luar" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="section-best-seller" class="p-6 bg-white mb-3 shadow-sm rounded-b-[40px]">
        <h2 class="text-[11px] font-black uppercase text-slate-400 mb-5 tracking-[0.2em] flex items-center gap-2">🔥 Paling Laris</h2>
        <div id="container-best-seller" class="flex gap-5 overflow-x-auto no-scrollbar pb-2"></div>
    </div>

    <div class="sticky top-0 bg-slate-50/80 backdrop-blur-lg z-40 overflow-x-auto no-scrollbar flex whitespace-nowrap px-6 py-5 gap-3" id="tabs-kategori"></div>

    <div class="p-6">
        <div id="container-menu" class="space-y-5"></div>
    </div>

    <div id="bar-keranjang" class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900 text-white p-5 rounded-[28px] shadow-2xl flex justify-between items-center hidden z-50 border border-white/10">
        <div id="ringkasan-singkat"></div>
        <button onclick="munculkanPopup()" class="bg-orange-500 px-8 py-4 rounded-xl font-black text-[12px] uppercase shadow-lg shadow-orange-500/40 animate-order active:scale-95 transition-all">Lihat Pesanan</button>
    </div>

    <div id="layar-hitam" class="overlay-mask" onclick="hilangkanPopup()">
        <div class="konten-putih" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="font-black text-2xl text-slate-800 uppercase italic">Isi Pesanan</h2>
                    <div class="mt-2 inline-block bg-orange-600 text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase">ROOM: <span class="no-room">--</span></div>
                </div>
                <button onclick="resetKeranjang()" class="text-red-500 text-[10px] font-black uppercase bg-red-50 px-4 py-2 rounded-xl italic">Reset</button>
            </div>
            <div id="list-checkout" class="space-y-4 overflow-y-auto mb-2 pr-1 flex-1 no-scrollbar"></div>
            <div class="border-t border-slate-100 pt-4">
                <div class="flex justify-between items-center mb-4 px-1">
                    <span class="font-black text-slate-400 text-xs uppercase tracking-widest">Total Estimasi</span>
                    <span id="harga-akhir" class="font-black text-2xl text-orange-600 italic">Rp 0</span>
                </div>
                <button onclick="jalankanKirimWA()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-sm active:scale-95 transition-all uppercase flex items-center justify-center gap-3 shadow-xl shadow-green-600/20">KIRIM VIA WA 🚀</button>
            </div>
        </div>
    </div>

    <div id="layar-bantuan" class="overlay-mask" onclick="tutupBantuan()">
        <div class="konten-putih" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h2 class="font-black text-xl text-slate-800 mb-6 uppercase italic text-center">Layanan Room</h2>
            <div class="space-y-4 mb-8">
                <button onclick="kirimBantuan('Minta Bill')" class="w-full p-5 bg-slate-50 border border-slate-100 rounded-2xl text-left flex justify-between items-center active:bg-orange-50 transition-all group">
                    <span class="font-black text-slate-700 uppercase italic">Minta Bill / Tagihan</span><span class="text-2xl">🧾</span>
                </button>
                <button onclick="kirimBantuan('Panggil Pelayan')" class="w-full p-5 bg-slate-50 border border-slate-100 rounded-2xl text-left flex justify-between items-center active:bg-orange-50 transition-all group">
                    <span class="font-black text-slate-700 uppercase italic">Panggil Staff</span><span class="text-2xl">🙋‍♂️</span>
                </button>
            </div>
            <button onclick="tutupBantuan()" class="w-full py-4 text-slate-400 font-bold text-[10px] uppercase text-center">Tutup</button>
        </div>
    </div>

    <div id="notif-sukses" class="overlay-mask" onclick="tutupNotif()">
        <div class="konten-putih items-center text-center pb-12" onclick="event.stopPropagation()">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mb-6 mt-4">✓</div>
            <h2 class="text-2xl font-black text-slate-800 uppercase italic">Berhasil Terkirim!</h2>
            <p class="text-slate-500 text-sm mt-2 px-6">Pesanan segera diantar ke Room <span class="no-room">--</span></p>
            <button onclick="tutupNotif()" class="mt-8 w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-sm uppercase">Siap!</button>
        </div>
    </div>

    <script>
        const URL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv"; 
        const WA_NUMBER = "6285348773757";
        
        let databaseMenu = [], listKategoriTetap = [], dataKeranjang = {}, riwayatPesananLokal = [];
        let katAktif = "SEMUA", roomNumber = "101", queryCari = "";

        function deteksiRoom() {
            const r = new URLSearchParams(window.location.search).get('room');
            if (r) roomNumber = r.toUpperCase();
            document.querySelectorAll('.no-room').forEach(el => el.innerText = roomNumber);
            document.getElementById('info-room-header').innerText = "📍 Room: " + roomNumber;
        }

        async function ambilData() {
            try {
                const res = await fetch(URL_SHEETS + "&t=" + new Date().getTime());
                const text = await res.text();
                const baris = text.split(/\r?\n/).slice(1);
                databaseMenu = []; let setKategori = new Set();
                baris.forEach(r => {
                    let k = r.split(",");
                    if (k.length >= 2) {
                        const nama = k[0]?.replace(/"/g, '').trim();
                        const harga = parseInt(k[1]?.replace(/[^0-9]/g, '')) || 0;
                        const kategori = k[2]?.replace(/"/g, '').trim().toUpperCase() || "LAINNYA";
                        const foto = k[3]?.replace(/"/g, '').trim() || "";
                        const deskripsi = k[4]?.replace(/"/g, '').trim() || ""; 
                        if (nama && harga > 0) {
                            databaseMenu.push({ nama, harga, kategori, foto, deskripsi });
                            setKategori.add(kategori);
                        }
                    }
                });
                listKategoriTetap = ["SEMUA", ...Array.from(setKategori).sort()];
                renderTabs(); renderBestSeller(); renderMenu();
            } catch (e) { console.error(e); }
        }

        function renderTabs() {
            let html = "";
            listKategoriTetap.forEach(kt => {
                const cls = kt === katAktif ? "active-tab" : "bg-white text-slate-400 font-bold rounded-2xl border border-slate-100";
                html += `<button onclick="gantiKat('${kt}')" class="px-6 py-4 text-[10px] uppercase tracking-widest transition-all ${cls}">${kt}</button>`;
            });
            document.getElementById('tabs-kategori').innerHTML = html;
        }

        function renderBestSeller() {
            let html = "";
            databaseMenu.slice(0, 6).forEach(m => {
                const img = m.foto ? `<img src="${m.foto}" class="w-full h-28 object-cover rounded-2xl mb-3">` : `<div class="w-full h-28 bg-orange-50 rounded-2xl mb-3"></div>`;
                html += `<div onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="min-w-[155px] bg-white p-2.5 rounded-[28px] border border-slate-100 relative active:scale-95 shadow-sm">
                    <span class="badge-hot">BEST</span>${img}
                    <p class="font-black text-slate-800 text-[11px] truncate uppercase italic">${m.nama}</p>
                    <p class="text-orange-600 font-black text-[12px] italic">Rp ${m.harga.toLocaleString('id-ID')}</p>
                </div>`;
            });
            document.getElementById('container-best-seller').innerHTML = html;
        }

        function renderMenu() {
            let html = "";
            const filtered = databaseMenu.filter(m => (katAktif === "SEMUA" || m.kategori === katAktif) && m.nama.toLowerCase().includes(queryCari));
            filtered.forEach(m => {
                const q = dataKeranjang[m.nama]?.qty || 0;
                const activeCard = q > 0 ? 'border-orange-500 bg-orange-50 shadow-orange-100' : 'border-white bg-white shadow-sm';
                const img = m.foto ? `<img src="${m.foto}" class="w-24 h-24 object-cover rounded-2xl shadow-sm">` : `<div class="w-24 h-24 bg-slate-50 rounded-2xl"></div>`;
                html += `<div class="p-4 rounded-[30px] flex items-center border-2 transition-all ${activeCard}">
                    <div class="mr-4">${img}</div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-black text-slate-800 text-[14px] truncate uppercase italic leading-none">${m.nama}</h3>
                        <p class="text-[10px] text-slate-400 mt-2 line-clamp-2 italic font-medium leading-relaxed">${m.deskripsi || 'Nikmati menu spesial kami.'}</p>
                        <p class="text-orange-600 text-[14px] font-black mt-3 italic">Rp ${m.harga.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex flex-col items-center gap-2 bg-slate-100/50 p-1 rounded-2xl ml-2">
                        <button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', 1)" class="bg-orange-500 text-white w-10 h-10 rounded-xl font-black shadow-lg active:scale-90">+</button>
                        ${q > 0 ? `<span class="font-black text-sm text-slate-700">${q}</span><button onclick="ubahQty('${m.nama.replace(/'/g, "\\'")}', -1)" class="text-red-400 font-bold text-[9px] uppercase p-1">Hapus</button>` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('container-menu').innerHTML = html || '<div class="text-center py-20 text-slate-400 italic">Menu tidak ditemukan</div>';
        }

        function ubahQty(nama, d) {
            if (!dataKeranjang[nama]) {
                const item = databaseMenu.find(x => x.nama === nama);
                dataKeranjang[nama] = { ...item, qty: 0, catatan: "" };
            }
            dataKeranjang[nama].qty += d;
            if (dataKeranjang[nama].qty <= 0) delete dataKeranjang[nama];
            renderMenu(); renderBestSeller(); updateBar();
        }

        function updateBar() {
            const arr = Object.values(dataKeranjang);
            const tQty = arr.reduce((a, b) => a + b.qty, 0);
            const tPrice = arr.reduce((a, b) => a + (b.harga * b.qty), 0);
            const el = document.getElementById('bar-keranjang');
            if (tQty > 0) {
                el.classList.remove('hidden');
                document.getElementById('ringkasan-singkat').innerHTML = `<p class="font-black text-lg italic leading-none">${tQty} Items</p><p class="text-[9px] text-orange-400 font-black uppercase mt-1">Rp ${tPrice.toLocaleString('id-ID')}</p>`;
            } else el.classList.add('hidden');
        }

        function munculkanPopup() {
            const arr = Object.values(dataKeranjang);
            let h = "", t = 0, jm = 0, jk = 0;
            arr.forEach(i => {
                const s = i.harga * i.qty; t += s;
                if(i.kategori.includes("MINUMAN") || i.kategori.includes("DRINK")) jk += i.qty; else jm += i.qty;
                h += `<div class="bg-slate-50 p-4 rounded-[24px] border border-slate-100 space-y-3">
                    <div class="flex justify-between items-start">
                        <p class="font-black text-slate-800 text-[14px] uppercase italic flex-1 pr-4">${i.nama}</p>
                        <div class="text-right">
                            <p class="font-black text-slate-800 text-[14px]">Rp ${s.toLocaleString('id-ID')}</p>
                            <div class="flex items-center gap-3 bg-white border px-2 py-1 rounded-lg mt-2">
                                <button onclick="ubahQty('${i.nama.replace(/'/g, "\\'")}', -1); munculkanPopup()" class="text-red-500 font-bold text-xs">-</button>
                                <span class="text-[10px] font-black">${i.qty}</span>
                                <button onclick="ubahQty('${i.nama.replace(/'/g, "\\'")}', 1); munculkanPopup()" class="text-green-500 font-bold text-xs">+</button>
                            </div>
                        </div>
                    </div>
                    <input type="text" onchange="updateCatatan('${i.nama.replace(/'/g, "\\'")}', this.value)" value="${i.catatan || ''}" placeholder="Catatan khusus..." class="w-full bg-white border rounded-xl py-3 px-4 text-[11px] italic outline-none">
                </div>`;
            });
            // REKOMENDASI CROSS-SELL
            let target = (jk > jm) ? ["MAKANAN", "FOOD", "SNACK"] : ["MINUMAN", "DRINK"];
            let saran = databaseMenu.filter(m => !dataKeranjang[m.nama] && target.some(k => m.kategori.includes(k))).sort(() => 0.5 - Math.random()).slice(0, 2);
            let csHtml = saran.length > 0 ? `<div class="mt-6 mb-2"><p class="text-[10px] font-black text-orange-500 uppercase mb-3">Tambahkan ini?</p><div class="grid grid-cols-2 gap-3">${saran.map(s => `<div onclick="ubahQty('${s.nama.replace(/'/g, "\\'")}', 1); munculkanPopup()" class="bg-orange-50 p-3 rounded-2xl text-center"><p class="font-black text-[9px] uppercase italic">${s.nama}</p><button class="mt-2 text-orange-500 text-[8px] font-black uppercase">+ Tambah</button></div>`).join('')}</div></div>` : "";

            document.getElementById('list-checkout').innerHTML = (h || '<p class="text-center py-10 italic">Keranjang kosong</p>') + csHtml;
            document.getElementById('harga-akhir').innerText = `Rp ${t.toLocaleString('id-ID')}`;
            document.getElementById('layar-hitam').classList.add('tampil');
        }

        function filterMenu() { queryCari = document.getElementById('input-cari').value.toLowerCase(); renderMenu(); }
        function gantiKat(k) { katAktif = k; renderTabs(); renderMenu(); }
        function updateCatatan(n, v) { if(dataKeranjang[n]) dataKeranjang[n].catatan = v; }
        function hilangkanPopup() { document.getElementById('layar-hitam').classList.remove('tampil'); }
        function resetKeranjang() { if(confirm("Hapus semua?")) { dataKeranjang = {}; hilangkanPopup(); renderMenu(); updateBar(); } }
        function bukaBantuan() { document.getElementById('layar-bantuan').classList.add('tampil'); }
        function tutupBantuan() { document.getElementById('layar-bantuan').classList.remove('tampil'); }
        function kirimBantuan(j) { window.open(`https://wa.me/${WA_NUMBER}?text=Halo, saya dari *Room ${roomNumber}* butuh: *${j}*`); tutupBantuan(); }
        function tutupNotif() { document.getElementById('notif-sukses').classList.remove('tampil'); }

        function jalankanKirimWA() {
            const arr = Object.values(dataKeranjang); if(arr.length === 0) return;
            let msg = `Halo Happy Puppy Samarinda,%0ASaya dari *Room ${roomNumber}* pesan:%0A%0A`;
            arr.forEach(i => { msg += `- *${i.nama}* (${i.qty}x)%0A${i.catatan ? ` Catatan: ${i.catatan}%0A` : ''}`; });
            window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`);
            arr.forEach(item => {
                const idx = riwayatPesananLokal.findIndex(r => r.nama === item.nama);
                if(idx > -1) riwayatPesananLokal[idx].qty += item.qty; else riwayatPesananLokal.push({nama:item.nama, qty:item.qty});
            });
            setTimeout(() => { hilangkanPopup(); dataKeranjang = {}; renderMenu(); updateBar(); updateRiwayat(); document.getElementById('notif-sukses').classList.add('tampil'); }, 800);
        }

        function updateRiwayat() {
            const w = document.getElementById('widget-pesanan-saya'), c = document.getElementById('list-riwayat-luar'), b = document.getElementById('jumlah-riwayat');
            if (riwayatPesananLokal.length > 0) {
                w.classList.remove('hidden'); b.innerText = riwayatPesananLokal.length;
                let h = "";
                riwayatPesananLokal.forEach(r => { h += `<div class="bg-white/90 px-4 py-2.5 rounded-xl flex items-center gap-2 flex-shrink-0 border border-orange-100 shadow-sm"><span class="text-[10px] font-black text-orange-600">${r.qty}x</span><span class="text-[9px] font-bold uppercase italic">${r.nama}</span></div>`; });
                c.innerHTML = h;
            }
        }

        deteksiRoom(); ambilData();
    </script>
</body>
</html>
