<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Happy Puppy Samarinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { background-color: #f97316; color: white; border-radius: 9999px; }
    </style>
</head>
<body class="bg-gray-50 pb-32 font-sans text-gray-900">

    <div class="h-44 bg-slate-900 relative">
        <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800" class="w-full h-full object-cover opacity-40">
        <div class="absolute bottom-5 left-5 text-white">
            <h1 class="text-2xl font-bold text-orange-400 uppercase leading-tight">Happy Puppy <br>Samarinda</h1>
            <p class="text-[10px] opacity-70 tracking-widest uppercase">Digital Ordering System</p>
        </div>
    </div>

    <div class="sticky top-0 bg-white shadow-sm z-40 overflow-x-auto no-scrollbar flex whitespace-nowrap px-4 py-3 gap-2 border-b border-gray-100" id="tabs-kategori"></div>

    <div class="p-5">
        <div id="container-menu" class="space-y-4">
            <p class="text-center py-20 text-gray-400 font-medium">Memuat menu pilihan...</p>
        </div>
    </div>

    <div id="btn-keranjang" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-zinc-900 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center hidden z-50 transition-all duration-300">
        <div id="info-pesanan"></div>
        <button onclick="kirimWhatsApp()" class="bg-green-500 active:scale-95 transition-all px-6 py-2 rounded-xl font-bold text-sm">PESAN VIA WA</button>
    </div>

    <script>
        const URL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDCkc69puC1CIoN5NnY8RggTTjvOFvbxau5FcU94eSnROveTeHS4ERbNptDZ_aGVvFNju6DAHiQvYn/pub?output=csv"; 
        
        let semuaMenu = [];
        let keranjang = {}; // Menggunakan object agar mudah hitung jumlah per item
        let kategoriAktif = "SEMUA";

        async function muatMenu() {
            try {
                const response = await fetch(URL_SHEETS);
                const csvText = await response.text();
                const baris = csvText.split(/\r?\n/).slice(1);
                
                semuaMenu = [];
                let daftarKategori = new Set(["SEMUA"]);

                baris.forEach(txt => {
                    let kolom = txt.split(",");
                    if (kolom.length >= 2) {
                        const nama = kolom[0] ? kolom[0].replace(/"/g, '').trim() : "";
                        const hargaRaw = kolom[1] ? kolom[1].replace(/[^0-9]/g, '') : "0";
                        const harga = parseInt(hargaRaw) || 0;
                        const kategori = kolom[2] ? kolom[2].replace(/"/g, '').trim().toUpperCase() : "LAINNYA";

                        if (nama && harga > 0) {
                            semuaMenu.push({ nama, harga, kategori });
                            daftarKategori.add(kategori);
                        }
                    }
                });

                renderTabs(Array.from(daftarKategori));
                tampilkanMenu();
            } catch (error) {
                document.getElementById('container-menu').innerHTML = "<p class='text-center text-red-500'>Koneksi error.</p>";
            }
        }

        function renderTabs(kategoris) {
            let html = "";
            kategoris.forEach(kat => {
                const activeClass = kat === kategoriAktif ? "active-tab" : "text-gray-500 bg-gray-100 rounded-full";
                html += `<button onclick="filterKategori('${kat}')" class="px-4 py-2 text-[10px] font-bold uppercase transition-all ${activeClass}">${kat}</button>`;
            });
            document.getElementById('tabs-kategori').innerHTML = html;
        }

        function filterKategori(kat) {
            kategoriAktif = kat;
            renderTabs(Array.from(new Set(["SEMUA", ...semuaMenu.map(m => m.kategori)])));
            tampilkanMenu();
        }

        function tampilkanMenu() {
            let html = "";
            const menuDifilter = kategoriAktif === "SEMUA" ? semuaMenu : semuaMenu.filter(m => m.kategori === kategoriAktif);

            menuDifilter.forEach(m => {
                const qty = keranjang[m.nama]?.qty || 0;
                
                html += `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center text-orange-500 font-black text-[10px]">HP</div>
                        <div>
                            <h3 class="font-bold text-gray-800 text-sm leading-tight">${m.nama}</h3>
                            <p class="text-orange-600 text-xs font-bold mt-1">Rp ${m.harga.toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        ${qty > 0 ? `
                            <button onclick="updateQty('${m.nama}', -1)" class="w-8 h-8 rounded-lg border-2 border-orange-500 text-orange-500 font-bold flex items-center justify-center">-</button>
                            <span class="font-bold text-sm w-4 text-center">${qty}</span>
                        ` : ''}
                        <button onclick="updateQty('${m.nama}', 1)" class="bg-orange-500 text-white w-8 h-8 rounded-lg font-bold flex items-center justify-center shadow-md shadow-orange-100">+</button>
                    </div>
                </div>`;
            });
            document.getElementById('container-menu').innerHTML = html;
        }

        function updateQty(nama, delta) {
            const item = semuaMenu.find(m => m.nama === nama);
            if (!keranjang[nama]) {
                keranjang[nama] = { ...item, qty: 0 };
            }
            
            keranjang[nama].qty += delta;

            if (keranjang[nama].qty <= 0) {
                delete keranjang[nama];
            }

            tampilkanMenu();
            updateKeranjangUI();
        }

        function updateKeranjangUI() {
            const keys = Object.keys(keranjang);
            const totalQty = keys.reduce((acc, key) => acc + keranjang[key].qty, 0);
            const totalPrice = keys.reduce((acc, key) => acc + (keranjang[key].harga * keranjang[key].qty), 0);

            const btn = document.getElementById('btn-keranjang');
            if (totalQty > 0) {
                btn.classList.remove('hidden');
                document.getElementById('info-pesanan').innerHTML = `
                    <p class="font-bold text-sm">${totalQty} Pesanan</p>
                    <p class="text-[10px] text-orange-400 font-bold">Total: Rp ${totalPrice.toLocaleString('id-ID')}</p>
                `;
            } else {
                btn.classList.add('hidden');
            }
        }

        function kirimWhatsApp() {
            const noWA = "6285348773757";
            const keys = Object.keys(keranjang);
            const daftar = keys.map(key => `• ${key} (${keranjang[key].qty}x)`).join('%0A');
            const totalPrice = keys.reduce((acc, key) => acc + (keranjang[key].harga * keranjang[key].qty), 0);
            
            const teks = `Halo Happy Puppy Samarinda,%0A%0ASaya mau pesan:%0A${daftar}%0A%0A*Total: Rp ${totalPrice.toLocaleString('id-ID')}*`;
            window.open(`https://wa.me/${noWA}?text=${teks}`, '_blank');
        }

        muatMenu();
    </script>
</body>
</html>
